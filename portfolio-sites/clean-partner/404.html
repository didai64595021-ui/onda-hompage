<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>페이지를 찾을 수 없습니다 — 클린파트너</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230066FF'/%3E%3Ctext x='50' y='68' text-anchor='middle' font-family='sans-serif' font-weight='800' font-size='48' fill='white'%3ECP%3C/text%3E%3C/svg%3E">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #F8FAFC;
      color: #1A1A2E;
      text-align: center;
      padding: 24px;
    }
    .error-wrap { max-width: 480px; }
    .error-code {
      font-size: clamp(5rem, 15vw, 10rem);
      font-weight: 800;
      color: #0066FF;
      line-height: 1;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 12px;
    }
    p {
      color: #5A6478;
      margin-bottom: 32px;
      line-height: 1.6;
    }
    .btn-home {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px 32px;
      background: #0066FF;
      color: #fff;
      border-radius: 9999px;
      font-weight: 600;
      font-size: 1rem;
      text-decoration: none;
      transition: background 0.3s, transform 0.3s;
      min-height: 48px;
    }
    .btn-home:hover {
      background: #0052CC;
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="error-wrap">
    <div class="error-code">404</div>
    <h1>페이지를 찾을 수 없습니다</h1>
    <p>요청하신 페이지가 존재하지 않거나 이동되었을 수 있습니다.<br>아래 버튼을 클릭하여 홈페이지로 돌아가세요.</p>
    <a href="index.html" class="btn-home">홈으로 돌아가기</a>
  </div>
</body>
</html>
