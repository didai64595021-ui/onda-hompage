<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>부루마블 보드게임</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
/* ===== RESET & BASE ===== */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{font-size:16px;overflow-x:hidden}
body{
  font-family:'Noto Sans KR',sans-serif;
  background:#0a0a1a;
  color:#fff;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  position:relative;
  overflow-x:hidden;
}

/* ===== AURORA BACKGROUND ===== */
.aurora{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  overflow:hidden;
}
.aurora::before,.aurora::after,.aurora .blob{
  content:'';position:absolute;border-radius:50%;
  filter:blur(120px);opacity:.35;
  animation:auroraMove 20s ease-in-out infinite alternate;
}
.aurora::before{
  width:600px;height:600px;
  background:radial-gradient(circle,#FF6B35 0%,transparent 70%);
  top:-10%;left:10%;
}
.aurora::after{
  width:500px;height:500px;
  background:radial-gradient(circle,#00D4FF 0%,transparent 70%);
  bottom:0;right:5%;
  animation-delay:-7s;animation-duration:25s;
}
.aurora .blob{
  width:550px;height:550px;
  background:radial-gradient(circle,#7C4DFF 0%,transparent 70%);
  top:30%;left:40%;
  animation-delay:-13s;animation-duration:22s;
}
@keyframes auroraMove{
  0%{transform:translate(0,0) scale(1)}
  33%{transform:translate(80px,-60px) scale(1.1)}
  66%{transform:translate(-60px,80px) scale(.95)}
  100%{transform:translate(40px,40px) scale(1.05)}
}

/* ===== NOISE OVERLAY ===== */
.noise{
  position:fixed;inset:0;z-index:1;pointer-events:none;
  opacity:.04;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:128px 128px;
}

/* ===== STARS ===== */
.stars{position:fixed;inset:0;z-index:0;pointer-events:none}
.star{
  position:absolute;
  width:2px;height:2px;
  background:#fff;border-radius:50%;
  animation:twinkle var(--dur) ease-in-out infinite alternate;
  opacity:0;
}
@keyframes twinkle{
  0%{opacity:.1;transform:scale(.8)}
  100%{opacity:var(--max-o,0.9);transform:scale(1.2)}
}

/* ===== MAIN WRAPPER ===== */
.game-wrapper{
  position:relative;z-index:2;
  display:flex;flex-direction:column;align-items:center;
  padding:20px;width:100%;
}

/* ===== TOP BAR ===== */
.top-bar{
  display:flex;align-items:center;justify-content:space-between;
  width:100%;max-width:740px;
  padding:12px 20px;margin-bottom:16px;
  background:rgba(255,255,255,.05);
  backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,.1);
  border-radius:16px;
  font-size:.9rem;
}
.top-bar .turn-info{font-weight:700;color:#00D4FF}
.top-bar .cell-name{color:#FF6B35;font-weight:700}
.sound-toggle{
  background:none;border:none;color:#fff;font-size:1.3rem;
  cursor:pointer;opacity:.7;transition:opacity .3s;
}
.sound-toggle:hover{opacity:1}

/* ===== BOARD (CSS Grid 6x6) ===== */
.board{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  grid-template-rows:repeat(6,1fr);
  gap:4px;
  width:720px;height:720px;
  background:rgba(255,255,255,.03);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.1);
  border-radius:20px;
  padding:6px;
  box-shadow:0 0 60px rgba(0,212,255,.08),0 0 120px rgba(124,77,255,.06);
}
.cell{
  position:relative;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:12px;
  cursor:default;
  transition:transform .3s cubic-bezier(.34,1.56,.64,1),box-shadow .3s,background .3s;
  overflow:hidden;
  padding:2px;
}
.cell:hover{
  transform:translateY(-3px) scale(1.04);
  box-shadow:0 8px 25px rgba(0,0,0,.3);
  background:rgba(255,255,255,.08);
}
.cell .emoji{font-size:1.6rem;line-height:1;margin-bottom:2px}
.cell .name{
  font-size:.55rem;font-weight:700;
  text-align:center;line-height:1.15;
  color:rgba(255,255,255,.85);
  letter-spacing:-.02em;
}
.cell.active{
  animation:neonPulse 1.5s ease-in-out infinite;
  z-index:5;
}
@keyframes neonPulse{
  0%,100%{box-shadow:0 0 8px rgba(0,212,255,.5),0 0 20px rgba(0,212,255,.3)}
  50%{box-shadow:0 0 15px rgba(0,212,255,.8),0 0 40px rgba(0,212,255,.5),0 0 60px rgba(0,212,255,.2)}
}

/* Corner cells */
.cell.corner{
  background:linear-gradient(135deg,rgba(255,255,255,.08),rgba(255,255,255,.02));
  border-color:rgba(255,255,255,.15);
}
.cell.corner .emoji{font-size:2rem}
.cell.corner .name{font-size:.65rem}

/* Cell color accents */
.cell[data-type="start"]{background:linear-gradient(135deg,rgba(255,107,53,.15),rgba(255,107,53,.05))}
.cell[data-type="island"]{background:linear-gradient(135deg,rgba(255,215,0,.12),rgba(255,215,0,.03))}
.cell[data-type="chance"]{background:linear-gradient(135deg,rgba(124,77,255,.15),rgba(124,77,255,.05))}
.cell[data-type="lucky"]{background:linear-gradient(135deg,rgba(255,0,128,.15),rgba(255,0,128,.05))}
.cell[data-type="forward"]{background:linear-gradient(135deg,rgba(0,212,255,.12),rgba(0,212,255,.03))}
.cell[data-type="backward"]{background:linear-gradient(135deg,rgba(255,69,58,.12),rgba(255,69,58,.03))}
.cell[data-type="again"]{background:linear-gradient(135deg,rgba(52,199,89,.15),rgba(52,199,89,.05))}
.cell[data-type="parking"]{background:linear-gradient(135deg,rgba(142,142,147,.15),rgba(142,142,147,.05))}

/* Player piece */
.player{
  position:absolute;
  font-size:1.3rem;
  bottom:2px;right:4px;
  animation:bounce 1s ease-in-out infinite;
  filter:drop-shadow(0 0 6px rgba(0,212,255,.6));
  z-index:10;
  transition:all .3s;
}
@keyframes bounce{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-4px)}
}

/* ===== CENTER AREA ===== */
.center{
  grid-column:2/6;grid-row:2/6;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:rgba(255,255,255,.02);
  border:1px solid rgba(255,255,255,.06);
  border-radius:16px;
  gap:10px;
  padding:10px;
}
.center .logo{
  font-family:'Black Han Sans',sans-serif;
  font-size:1.8rem;
  background:linear-gradient(135deg,#FF6B35,#00D4FF,#7C4DFF);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  letter-spacing:2px;
}
.center .sub{
  font-size:.7rem;color:rgba(255,255,255,.4);
  margin-top:-6px;
}

/* ===== 3D DICE ===== */
.dice-container{
  perspective:600px;
  width:70px;height:70px;
  margin:4px 0;
}
.dice{
  width:70px;height:70px;
  position:relative;
  transform-style:preserve-3d;
  transition:transform .8s cubic-bezier(.25,.8,.25,1);
}
.dice.rolling{
  animation:diceRoll .8s ease-out;
}
@keyframes diceRoll{
  0%{transform:rotateX(0) rotateY(0) rotateZ(0)}
  20%{transform:rotateX(240deg) rotateY(180deg) rotateZ(90deg)}
  40%{transform:rotateX(480deg) rotateY(360deg) rotateZ(180deg)}
  60%{transform:rotateX(720deg) rotateY(540deg) rotateZ(90deg)}
  80%{transform:rotateX(900deg) rotateY(660deg) rotateZ(0deg)}
}
.face{
  position:absolute;width:70px;height:70px;
  background:linear-gradient(145deg,#fff,#e8e8e8);
  border:2px solid rgba(0,0,0,.1);
  border-radius:12px;
  display:grid;
  padding:10px;
  box-shadow:inset 0 0 15px rgba(0,0,0,.05);
}
.face .dot{
  width:12px;height:12px;
  background:radial-gradient(circle at 35% 35%,#555,#111);
  border-radius:50%;
  align-self:center;justify-self:center;
}
/* Face positions */
.face-1{transform:rotateY(0deg) translateZ(35px)}
.face-2{transform:rotateY(180deg) translateZ(35px)}
.face-3{transform:rotateY(-90deg) translateZ(35px)}
.face-4{transform:rotateY(90deg) translateZ(35px)}
.face-5{transform:rotateX(90deg) translateZ(35px)}
.face-6{transform:rotateX(-90deg) translateZ(35px)}
/* Dot grids */
.face-1{grid-template:1fr/1fr;place-items:center}
.face-2{grid-template:1fr 1fr/1fr;align-items:center;justify-items:center}
.face-2 .dot:nth-child(1){justify-self:end;align-self:start}
.face-2 .dot:nth-child(2){justify-self:start;align-self:end}
.face-3{grid-template:1fr 1fr 1fr/1fr}
.face-3 .dot:nth-child(1){justify-self:end;align-self:start}
.face-3 .dot:nth-child(2){justify-self:center;align-self:center}
.face-3 .dot:nth-child(3){justify-self:start;align-self:end}
.face-4{grid-template:1fr 1fr/1fr 1fr}
.face-5{grid-template:1fr 1fr 1fr/1fr 1fr;align-items:center;justify-items:center}
.face-5 .dot:nth-child(1){grid-area:1/1}
.face-5 .dot:nth-child(2){grid-area:1/2}
.face-5 .dot:nth-child(3){grid-area:2/1;grid-column:1/3;justify-self:center}
.face-5 .dot:nth-child(4){grid-area:3/1}
.face-5 .dot:nth-child(5){grid-area:3/2}
.face-6{grid-template:1fr 1fr 1fr/1fr 1fr}
.dice-shadow{
  width:60px;height:10px;
  background:radial-gradient(ellipse,rgba(0,0,0,.3),transparent);
  border-radius:50%;
  margin-top:6px;
}

/* ===== ROLL BUTTON ===== */
.roll-btn{
  font-family:'Black Han Sans',sans-serif;
  font-size:1rem;
  padding:10px 32px;
  background:linear-gradient(135deg,#FF6B35,#ff8f5e);
  color:#fff;border:none;border-radius:50px;
  cursor:pointer;
  box-shadow:0 0 20px rgba(255,107,53,.4),0 4px 15px rgba(0,0,0,.3);
  transition:all .3s;
  position:relative;overflow:hidden;
}
.roll-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 0 30px rgba(255,107,53,.6),0 6px 20px rgba(0,0,0,.3);
}
.roll-btn:active{transform:translateY(0);box-shadow:0 0 15px rgba(255,107,53,.3)}
.roll-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.roll-btn::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.2),transparent);
  transform:translateX(-100%);
}
.roll-btn:not(:disabled):hover::after{
  animation:btnShine .6s ease;
}
@keyframes btnShine{
  0%{transform:translateX(-100%)}100%{transform:translateX(100%)}
}
.typing-text{
  font-size:.7rem;color:rgba(255,255,255,.5);
  min-height:1.1em;margin-bottom:2px;
}

/* ===== EVENT MODAL ===== */
.modal-overlay{
  position:fixed;inset:0;z-index:100;
  background:rgba(0,0,0,.6);
  backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;
  transition:opacity .3s;
}
.modal-overlay.show{opacity:1;pointer-events:auto}
.modal-card{
  background:rgba(30,30,50,.95);
  border:1px solid rgba(255,255,255,.15);
  border-radius:24px;
  padding:36px 32px 28px;
  max-width:360px;width:90%;
  text-align:center;
  transform:translateY(-40px) scale(.9);
  transition:transform .5s cubic-bezier(.175,.885,.32,1.275);
  box-shadow:0 25px 60px rgba(0,0,0,.5);
}
.modal-overlay.show .modal-card{transform:translateY(0) scale(1)}
.modal-card .modal-emoji{font-size:3rem;margin-bottom:12px}
.modal-card .modal-title{
  font-family:'Black Han Sans',sans-serif;
  font-size:1.4rem;margin-bottom:8px;
}
.modal-card .modal-desc{
  font-size:.9rem;color:rgba(255,255,255,.7);
  line-height:1.5;margin-bottom:20px;
}
.modal-card .modal-btn{
  font-family:'Black Han Sans',sans-serif;
  padding:10px 28px;font-size:1rem;
  background:linear-gradient(135deg,#7C4DFF,#aa7dff);
  color:#fff;border:none;border-radius:50px;
  cursor:pointer;
  box-shadow:0 0 20px rgba(124,77,255,.4);
  transition:all .3s;
}
.modal-card .modal-btn:hover{transform:scale(1.05);box-shadow:0 0 30px rgba(124,77,255,.6)}

/* Accent variants */
.modal-card.accent-orange .modal-title{color:#FF6B35}
.modal-card.accent-cyan .modal-title{color:#00D4FF}
.modal-card.accent-purple .modal-title{color:#7C4DFF}
.modal-card.accent-green .modal-title{color:#34C759}
.modal-card.accent-red .modal-title{color:#FF453A}
.modal-card.accent-gold .modal-title{color:#FFD700}
.modal-card.accent-pink .modal-title{color:#FF2D78}

/* ===== CONFETTI ===== */
.confetti-container{position:fixed;inset:0;z-index:200;pointer-events:none;overflow:hidden}
.confetti-piece{
  position:absolute;
  width:10px;height:10px;
  top:-20px;
  animation:confettiFall var(--fall-dur,3s) linear forwards;
}
@keyframes confettiFall{
  0%{transform:translateY(0) rotate(0deg);opacity:1}
  100%{transform:translateY(110vh) rotate(var(--rot,720deg));opacity:0}
}

/* ===== RESTART BUTTON ===== */
.restart-btn{
  display:none;
  font-family:'Black Han Sans',sans-serif;
  font-size:1rem;
  padding:12px 36px;
  margin-top:16px;
  background:linear-gradient(135deg,#00D4FF,#4de0ff);
  color:#0a0a1a;border:none;border-radius:50px;
  cursor:pointer;
  box-shadow:0 0 20px rgba(0,212,255,.4);
  transition:all .3s;
}
.restart-btn:hover{transform:translateY(-2px);box-shadow:0 0 30px rgba(0,212,255,.6)}

/* ===== RESPONSIVE ===== */
@media(max-width:768px){
  .board{width:90vw;height:90vw;gap:3px;padding:4px;border-radius:14px}
  .cell .emoji{font-size:1.2rem}
  .cell .name{font-size:.45rem}
  .cell.corner .emoji{font-size:1.5rem}
  .cell.corner .name{font-size:.5rem}
  .player{font-size:1rem}
  .center .logo{font-size:1.3rem}
  .dice-container{width:55px;height:55px}
  .dice{width:55px;height:55px}
  .face{width:55px;height:55px}
  .face .dot{width:9px;height:9px}
  .face-1{transform:rotateY(0deg) translateZ(27.5px)}
  .face-2{transform:rotateY(180deg) translateZ(27.5px)}
  .face-3{transform:rotateY(-90deg) translateZ(27.5px)}
  .face-4{transform:rotateY(90deg) translateZ(27.5px)}
  .face-5{transform:rotateX(90deg) translateZ(27.5px)}
  .face-6{transform:rotateX(-90deg) translateZ(27.5px)}
  .roll-btn{font-size:.85rem;padding:8px 24px}
  .top-bar{padding:8px 14px;font-size:.75rem;margin-bottom:10px}
}
@media(max-width:480px){
  body{justify-content:flex-start;padding-top:10px}
  .game-wrapper{padding:8px}
  .board{width:95vw;height:95vw;gap:2px;padding:3px;border-radius:10px}
  .cell{border-radius:6px;padding:1px}
  .cell .emoji{font-size:.85rem;margin-bottom:0}
  .cell .name{font-size:.32rem}
  .cell.corner .emoji{font-size:1.1rem}
  .cell.corner .name{font-size:.38rem}
  .player{font-size:.75rem;bottom:1px;right:2px}
  .center .logo{font-size:1rem;letter-spacing:1px}
  .center .sub{font-size:.5rem}
  .typing-text{font-size:.5rem}
  .dice-container{width:40px;height:40px}
  .dice{width:40px;height:40px}
  .face{width:40px;height:40px;padding:5px;border-radius:8px}
  .face .dot{width:7px;height:7px}
  .face-1{transform:rotateY(0deg) translateZ(20px)}
  .face-2{transform:rotateY(180deg) translateZ(20px)}
  .face-3{transform:rotateY(-90deg) translateZ(20px)}
  .face-4{transform:rotateY(90deg) translateZ(20px)}
  .face-5{transform:rotateX(90deg) translateZ(20px)}
  .face-6{transform:rotateX(-90deg) translateZ(20px)}
  .dice-shadow{width:35px;height:6px;margin-top:3px}
  .roll-btn{font-size:.75rem;padding:7px 20px}
  .top-bar{padding:6px 10px;font-size:.65rem;border-radius:10px;margin-bottom:8px}
  .modal-card{padding:24px 20px 20px;border-radius:18px}
  .modal-card .modal-emoji{font-size:2.2rem}
  .modal-card .modal-title{font-size:1.1rem}
  .modal-card .modal-desc{font-size:.8rem}
}
</style>
</head>
<body>

<!-- Background layers -->
<div class="aurora"><div class="blob"></div></div>
<div class="stars" id="stars"></div>
<div class="noise"></div>

<!-- Game -->
<div class="game-wrapper">
  <!-- Top Bar -->
  <div class="top-bar">
    <span>🎲 턴: <span class="turn-info" id="turnCount">1</span></span>
    <span>📍 <span class="cell-name" id="cellName">출발</span></span>
    <button class="sound-toggle" id="soundToggle" title="사운드 ON/OFF">🔊</button>
  </div>

  <!-- Board -->
  <div class="board" id="board"></div>

  <!-- Restart -->
  <button class="restart-btn" id="restartBtn" onclick="restartGame()">🔄 다시하기</button>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal-card" id="modalCard">
    <div class="modal-emoji" id="modalEmoji"></div>
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-desc" id="modalDesc"></div>
    <button class="modal-btn" id="modalBtn" onclick="closeModal()">확인</button>
  </div>
</div>

<!-- Confetti container -->
<div class="confetti-container" id="confettiContainer"></div>

<script>
/* ===== BOARD DATA ===== */
const CELLS = [
  {id:0, name:'출발',    emoji:'🚀', type:'start'},
  {id:1, name:'커피숍',  emoji:'☕', type:'normal'},
  {id:2, name:'찬스',    emoji:'🎲', type:'chance'},
  {id:3, name:'포토존A', emoji:'📸', type:'normal'},
  {id:4, name:'무인도',  emoji:'🏝️', type:'island'},
  {id:5, name:'팝업A',   emoji:'🎪', type:'normal'},
  {id:6, name:'한번더',  emoji:'🍀', type:'again'},
  {id:7, name:'푸드트럭',emoji:'🍔', type:'normal'},
  {id:8, name:'뒤로2칸', emoji:'⬅️', type:'backward'},
  {id:9, name:'포토존B', emoji:'📷', type:'normal'},
  {id:10,name:'주차장',  emoji:'🅿️', type:'parking'},
  {id:11,name:'DJ부스',  emoji:'🎧', type:'normal'},
  {id:12,name:'찬스',    emoji:'🎲', type:'chance'},
  {id:13,name:'네일샵',  emoji:'💅', type:'normal'},
  {id:14,name:'무인도',  emoji:'🏝️', type:'island'},
  {id:15,name:'팝업B',   emoji:'🎪', type:'normal'},
  {id:16,name:'앞으로3칸',emoji:'➡️',type:'forward'},
  {id:17,name:'플리마켓',emoji:'🛒', type:'normal'},
  {id:18,name:'포토존C', emoji:'📸', type:'normal'},
  {id:19,name:'럭키박스',emoji:'🎁', type:'lucky'}
];

/* Grid positions: [row, col] (1-indexed) */
const GRID_POS = {
  0:[1,1], 1:[1,2], 2:[1,3], 3:[1,4], 4:[1,5], 5:[1,6],
  6:[2,6], 7:[3,6], 8:[4,6], 9:[5,6],
  10:[6,6], 11:[6,5], 12:[6,4], 13:[6,3], 14:[6,2], 15:[6,1],
  16:[5,1], 17:[4,1], 18:[3,1], 19:[2,1]
};

const CORNERS = [0, 4, 5, 10, 14, 15, 19]; // larger corner cells (start + corners near)
const CORNER_IDS = [0, 10]; // true corners: start, parking

/* Chance card pool */
const CHANCE_CARDS = [
  {title:'전진!', desc:'2칸 앞으로 이동합니다!', move:2, emoji:'🏃', accent:'cyan'},
  {title:'후퇴!', desc:'1칸 뒤로 이동합니다.', move:-1, emoji:'😅', accent:'red'},
  {title:'순간이동', desc:'출발점으로 돌아갑니다!', moveTo:0, emoji:'🌀', accent:'purple'},
  {title:'행운의 주사위', desc:'한 번 더 굴릴 수 있습니다!', extraTurn:true, emoji:'🎰', accent:'green'},
  {title:'휴식', desc:'경치가 좋아서 1턴 쉽니다.', skip:true, emoji:'🌅', accent:'orange'},
  {title:'로켓 발사', desc:'3칸 앞으로 이동합니다!', move:3, emoji:'🚀', accent:'cyan'},
];

const LUCKY_REWARDS = [
  {title:'대박! 경품 당첨!', desc:'🎉 특별 경품에 당첨되었습니다!\n축하합니다!', emoji:'🏆', accent:'gold'},
  {title:'럭키 스타!', desc:'⭐ 행운의 별을 발견!\n한 번 더 굴릴 수 있어요!', emoji:'🌟', extraTurn:true, accent:'pink'},
  {title:'미스터리 박스', desc:'📦 5칸 전진 티켓 획득!', emoji:'📦', move:5, accent:'purple'},
];

/* ===== GAME STATE ===== */
let playerPos = 0;
let turn = 1;
let isMoving = false;
let skipNextTurn = false;
let extraTurn = false;
let soundOn = true;
let gameFinished = false;
let passedStart = false;

/* ===== WEB AUDIO ===== */
let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playTone(freq, dur, type='sine', vol=0.15) {
  if (!soundOn) return;
  try {
    const ctx = getAudio();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + dur);
  } catch(e) {}
}
function sfxDice() {
  playTone(800, 0.05, 'square', 0.1);
  setTimeout(() => playTone(600, 0.05, 'square', 0.1), 50);
  setTimeout(() => playTone(1000, 0.05, 'square', 0.1), 100);
}
function sfxStep() { playTone(440 + Math.random()*200, 0.08, 'sine', 0.08); }
function sfxEvent() {
  playTone(523, 0.15, 'sine', 0.12);
  setTimeout(() => playTone(659, 0.15, 'sine', 0.12), 150);
  setTimeout(() => playTone(784, 0.2, 'sine', 0.12), 300);
}
function sfxFanfare() {
  const notes = [523, 659, 784, 1047];
  notes.forEach((n, i) => {
    setTimeout(() => playTone(n, 0.3, 'square', 0.1), i * 200);
  });
}

/* ===== STARS GENERATION ===== */
(function initStars() {
  const container = document.getElementById('stars');
  for (let i = 0; i < 200; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.left = Math.random() * 100 + '%';
    s.style.top = Math.random() * 100 + '%';
    s.style.setProperty('--dur', (1.5 + Math.random() * 3) + 's');
    s.style.setProperty('--max-o', (0.4 + Math.random() * 0.6).toFixed(2));
    s.style.animationDelay = (Math.random() * 4) + 's';
    const size = (1 + Math.random() * 2) + 'px';
    s.style.width = size;
    s.style.height = size;
    container.appendChild(s);
  }
})();

/* ===== BUILD BOARD ===== */
function buildBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';

  // Create cell elements in grid order (row by row)
  // We need to place cells AND the center area
  const cellMap = {};
  CELLS.forEach(c => { cellMap[c.id] = c; });

  // Create all grid children
  for (let r = 1; r <= 6; r++) {
    for (let c = 1; c <= 6; c++) {
      // Check if this is a board cell
      let cellData = null;
      for (const [id, pos] of Object.entries(GRID_POS)) {
        if (pos[0] === r && pos[1] === c) {
          cellData = cellMap[parseInt(id)];
          break;
        }
      }

      if (cellData) {
        const el = document.createElement('div');
        el.className = 'cell' + (CORNER_IDS.includes(cellData.id) ? ' corner' : '');
        el.dataset.cellId = cellData.id;
        el.dataset.type = cellData.type;
        el.style.gridRow = r;
        el.style.gridColumn = c;
        el.innerHTML = `<span class="emoji">${cellData.emoji}</span><span class="name">${cellData.name}</span>`;
        board.appendChild(el);
      }
    }
  }

  // Center area
  const center = document.createElement('div');
  center.className = 'center';
  center.style.gridColumn = '2 / 6';
  center.style.gridRow = '2 / 6';
  center.innerHTML = `
    <div class="logo">부루마블</div>
    <div class="sub">BOARD GAME</div>
    <div class="typing-text" id="typingText"></div>
    <div class="dice-container">
      <div class="dice" id="dice">
        <div class="face face-1"><div class="dot"></div></div>
        <div class="face face-2"><div class="dot"></div><div class="dot"></div></div>
        <div class="face face-3"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
        <div class="face face-4"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
        <div class="face face-5"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
        <div class="face face-6"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
      </div>
    </div>
    <div class="dice-shadow"></div>
    <button class="roll-btn" id="rollBtn" onclick="rollDice()">주사위 굴리기</button>
  `;
  board.appendChild(center);

  // Place player
  updatePlayer();
  highlightActive();
  typeText('주사위를 굴려주세요!');
}

/* ===== DICE FACES ROTATION MAP ===== */
const DICE_ROTATIONS = {
  1: 'rotateX(0deg) rotateY(0deg)',
  2: 'rotateX(0deg) rotateY(180deg)',
  3: 'rotateX(0deg) rotateY(90deg)',
  4: 'rotateX(0deg) rotateY(-90deg)',
  5: 'rotateX(-90deg) rotateY(0deg)',
  6: 'rotateX(90deg) rotateY(0deg)',
};

/* ===== DICE ROLL ===== */
function rollDice() {
  if (isMoving || gameFinished) return;
  const btn = document.getElementById('rollBtn');
  btn.disabled = true;
  isMoving = true;
  extraTurn = false;

  if (skipNextTurn) {
    skipNextTurn = false;
    turn++;
    document.getElementById('turnCount').textContent = turn;
    showModal('🏝️', '무인도!', '1턴 쉬는 중... 다음 턴으로!', 'accent-orange', () => {
      btn.disabled = false;
      isMoving = false;
      typeText('주사위를 굴려주세요!');
    });
    return;
  }

  sfxDice();
  const result = Math.floor(Math.random() * 6) + 1;
  const dice = document.getElementById('dice');

  // Add extra full rotations for drama
  const extraX = 360 * (2 + Math.floor(Math.random() * 3));
  const extraY = 360 * (2 + Math.floor(Math.random() * 3));
  const base = DICE_ROTATIONS[result];
  const baseMatch = base.match(/rotateX\((-?\d+)deg\)\s*rotateY\((-?\d+)deg\)/);
  const finalX = parseInt(baseMatch[1]) + extraX;
  const finalY = parseInt(baseMatch[2]) + extraY;

  dice.classList.add('rolling');
  setTimeout(() => {
    dice.classList.remove('rolling');
    dice.style.transform = `rotateX(${finalX}deg) rotateY(${finalY}deg)`;

    typeText(`🎲 ${result} 나왔다!`);
    setTimeout(() => movePlayer(result), 400);
  }, 800);
}

/* ===== MOVE PLAYER ===== */
async function movePlayer(steps) {
  const totalCells = 20;
  let startPos = playerPos;

  for (let i = 0; i < steps; i++) {
    await sleep(280);
    playerPos = (playerPos + 1) % totalCells;
    sfxStep();
    updatePlayer();
    highlightActive();
    updateCellName();

    // Check if passed start (completed a lap)
    if (playerPos === 0 && i < steps - 1) {
      passedStart = true;
    }
  }

  // Check if landed on or passed start
  if (playerPos === 0 || passedStart) {
    passedStart = false;
    gameFinished = true;
    await sleep(300);
    sfxFanfare();
    launchConfetti();
    showModal('🎉', '완주 축하!', '한 바퀴를 완주했습니다!\n대단해요! 🏆', 'accent-gold', () => {
      document.getElementById('restartBtn').style.display = 'inline-block';
      document.getElementById('rollBtn').disabled = true;
      isMoving = false;
    });
    return;
  }

  await sleep(200);
  handleCellEvent();
}

/* ===== CELL EVENTS ===== */
function handleCellEvent() {
  const cell = CELLS[playerPos];
  const btn = document.getElementById('rollBtn');

  switch(cell.type) {
    case 'island':
      sfxEvent();
      skipNextTurn = true;
      showModal('🏝️', '무인도 도착!', '다음 턴은 쉬어야 합니다...', 'accent-orange', finishTurn);
      break;

    case 'backward':
      sfxEvent();
      showModal('⬅️', '뒤로 2칸!', '앗, 2칸 뒤로 이동합니다!', 'accent-red', async () => {
        closeModal();
        playerPos = (playerPos - 2 + 20) % 20;
        await animateMoveTo(playerPos);
        finishTurn();
      });
      break;

    case 'forward':
      sfxEvent();
      showModal('➡️', '앞으로 3칸!', '신난다! 3칸 전진!', 'accent-cyan', async () => {
        closeModal();
        const target = (playerPos + 3) % 20;
        for (let i = 0; i < 3; i++) {
          await sleep(280);
          playerPos = (playerPos + 1) % 20;
          sfxStep();
          updatePlayer();
          highlightActive();
          updateCellName();
          if (playerPos === 0) {
            passedStart = true;
          }
        }
        if (passedStart) {
          passedStart = false;
          gameFinished = true;
          sfxFanfare();
          launchConfetti();
          showModal('🎉', '완주 축하!', '한 바퀴를 완주했습니다!\n대단해요! 🏆', 'accent-gold', () => {
            document.getElementById('restartBtn').style.display = 'inline-block';
            btn.disabled = true;
            isMoving = false;
          });
          return;
        }
        finishTurn();
      });
      break;

    case 'again':
      sfxEvent();
      extraTurn = true;
      showModal('🍀', '한 번 더!', '행운! 한 번 더 굴릴 수 있습니다!', 'accent-green', finishTurn);
      break;

    case 'chance':
      sfxEvent();
      const card = CHANCE_CARDS[Math.floor(Math.random() * CHANCE_CARDS.length)];
      showModal(card.emoji, card.title, card.desc, 'accent-' + card.accent, async () => {
        closeModal();
        if (card.moveTo !== undefined) {
          playerPos = card.moveTo;
          updatePlayer();
          highlightActive();
          updateCellName();
        } else if (card.move) {
          const dir = card.move > 0 ? 1 : -1;
          const count = Math.abs(card.move);
          for (let i = 0; i < count; i++) {
            await sleep(280);
            playerPos = (playerPos + dir + 20) % 20;
            sfxStep();
            updatePlayer();
            highlightActive();
            updateCellName();
            if (playerPos === 0) passedStart = true;
          }
          if (passedStart) {
            passedStart = false;
            gameFinished = true;
            sfxFanfare();
            launchConfetti();
            showModal('🎉', '완주 축하!', '한 바퀴를 완주했습니다!', 'accent-gold', () => {
              document.getElementById('restartBtn').style.display = 'inline-block';
              btn.disabled = true;
              isMoving = false;
            });
            return;
          }
        }
        if (card.extraTurn) extraTurn = true;
        if (card.skip) skipNextTurn = true;
        finishTurn();
      });
      break;

    case 'lucky':
      sfxEvent();
      const reward = LUCKY_REWARDS[Math.floor(Math.random() * LUCKY_REWARDS.length)];
      showModal(reward.emoji, reward.title, reward.desc, 'accent-' + reward.accent, async () => {
        closeModal();
        if (reward.move) {
          for (let i = 0; i < reward.move; i++) {
            await sleep(280);
            playerPos = (playerPos + 1) % 20;
            sfxStep();
            updatePlayer();
            highlightActive();
            updateCellName();
            if (playerPos === 0) passedStart = true;
          }
          if (passedStart) {
            passedStart = false;
            gameFinished = true;
            sfxFanfare();
            launchConfetti();
            showModal('🎉', '완주 축하!', '한 바퀴를 완주했습니다!', 'accent-gold', () => {
              document.getElementById('restartBtn').style.display = 'inline-block';
              btn.disabled = true;
              isMoving = false;
            });
            return;
          }
        }
        if (reward.extraTurn) extraTurn = true;
        finishTurn();
      });
      break;

    default:
      finishTurn();
  }
}

function finishTurn() {
  if (!extraTurn) {
    turn++;
    document.getElementById('turnCount').textContent = turn;
  } else {
    typeText('🍀 한 번 더! 주사위를 굴려주세요!');
  }
  const btn = document.getElementById('rollBtn');
  btn.disabled = false;
  isMoving = false;
  if (!extraTurn) typeText('주사위를 굴려주세요!');
}

/* ===== PLAYER RENDERING ===== */
function updatePlayer() {
  // Remove existing players
  document.querySelectorAll('.player').forEach(p => p.remove());

  const cellEl = document.querySelector(`.cell[data-cell-id="${playerPos}"]`);
  if (cellEl) {
    const pl = document.createElement('div');
    pl.className = 'player';
    pl.textContent = '🏃';
    cellEl.appendChild(pl);
  }
}

function highlightActive() {
  document.querySelectorAll('.cell').forEach(c => c.classList.remove('active'));
  const cellEl = document.querySelector(`.cell[data-cell-id="${playerPos}"]`);
  if (cellEl) cellEl.classList.add('active');
}

function updateCellName() {
  document.getElementById('cellName').textContent = CELLS[playerPos].name;
}

/* ===== MODAL ===== */
let modalCallback = null;
function showModal(emoji, title, desc, accentClass, callback) {
  const overlay = document.getElementById('modal');
  const card = document.getElementById('modalCard');
  document.getElementById('modalEmoji').textContent = emoji;
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalDesc').textContent = desc;
  card.className = 'modal-card ' + (accentClass || '');
  overlay.classList.add('show');
  modalCallback = callback || null;
}
function closeModal() {
  document.getElementById('modal').classList.remove('show');
  if (modalCallback) {
    const cb = modalCallback;
    modalCallback = null;
    setTimeout(cb, 300);
  }
}

/* ===== CONFETTI ===== */
function launchConfetti() {
  const container = document.getElementById('confettiContainer');
  container.innerHTML = '';
  const colors = ['#FF6B35','#00D4FF','#7C4DFF','#FFD700','#FF2D78','#34C759','#FF453A'];
  for (let i = 0; i < 60; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random() * 100 + '%';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.width = (6 + Math.random() * 8) + 'px';
    piece.style.height = (6 + Math.random() * 8) + 'px';
    piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    piece.style.setProperty('--fall-dur', (2 + Math.random() * 2) + 's');
    piece.style.setProperty('--rot', (360 + Math.random() * 720) + 'deg');
    piece.style.animationDelay = (Math.random() * 0.8) + 's';
    container.appendChild(piece);
  }
  setTimeout(() => { container.innerHTML = ''; }, 5000);
}

/* ===== TYPING TEXT ===== */
let typingTimer = null;
function typeText(text) {
  const el = document.getElementById('typingText');
  if (!el) return;
  if (typingTimer) clearInterval(typingTimer);
  el.textContent = '';
  let i = 0;
  typingTimer = setInterval(() => {
    if (i < text.length) {
      el.textContent += text[i];
      i++;
    } else {
      clearInterval(typingTimer);
      typingTimer = null;
    }
  }, 40);
}

/* ===== SOUND TOGGLE ===== */
document.getElementById('soundToggle').addEventListener('click', function() {
  soundOn = !soundOn;
  this.textContent = soundOn ? '🔊' : '🔇';
});

/* ===== RESTART ===== */
function restartGame() {
  playerPos = 0;
  turn = 1;
  isMoving = false;
  skipNextTurn = false;
  extraTurn = false;
  gameFinished = false;
  passedStart = false;
  document.getElementById('turnCount').textContent = 1;
  document.getElementById('cellName').textContent = '출발';
  document.getElementById('restartBtn').style.display = 'none';
  document.getElementById('rollBtn').disabled = false;
  document.getElementById('confettiContainer').innerHTML = '';
  const dice = document.getElementById('dice');
  if (dice) dice.style.transform = DICE_ROTATIONS[1];
  buildBoard();
}

/* ===== HELPERS ===== */
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function animateMoveTo(target) {
  updatePlayer();
  highlightActive();
  updateCellName();
}

/* ===== INIT ===== */
buildBoard();
</script>
