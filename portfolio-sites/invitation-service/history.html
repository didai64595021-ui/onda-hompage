<style>
.history-wrap { padding-top: 72px; min-height: 100vh; }
.history-header {
  padding: 60px 0 40px; text-align: center;
  background: linear-gradient(180deg, rgba(183,110,121,0.05), transparent);
}
.history-header h1 { font-size: 32px; color: var(--deep-navy); margin-bottom: 8px; }
.history-header p { font-size: 15px; color: var(--text-mid); }

/* Filters */
.filter-bar {
  display: flex; justify-content: center; gap: 8px;
  margin-bottom: 40px; flex-wrap: wrap; padding: 0 16px;
}
.filter-btn {
  padding: 10px 24px; border-radius: 24px; font-size: 14px; font-weight: 500;
  background: #fff; color: var(--text-mid); border: 1.5px solid var(--border);
  cursor: pointer; transition: var(--transition);
}
.filter-btn:hover { border-color: var(--rose-gold); color: var(--rose-gold); }
.filter-btn.active {
  background: var(--deep-navy); color: #fff; border-color: var(--deep-navy);
}

/* Cards Grid */
.history-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(320px,1fr));
  gap: 24px; padding-bottom: 80px;
}
.history-card {
  background: #fff; border-radius: var(--radius-md); overflow: hidden;
  box-shadow: var(--shadow-sm); transition: var(--transition);
  border: 1px solid var(--border);
}
.history-card:hover { box-shadow: var(--shadow-md); transform: translateY(-3px); }
.history-card-top { display: flex; gap: 16px; padding: 20px; }
.history-thumb {
  width: 80px; height: 100px; border-radius: var(--radius-sm);
  object-fit: cover; flex-shrink: 0;
  background: linear-gradient(135deg, #fce4ec, #f3e5f5);
}
.history-info { flex: 1; min-width: 0; }
.history-info h3 {
  font-size: 16px; font-weight: 600; color: var(--deep-navy);
  margin-bottom: 6px; font-family: var(--font-body);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.history-meta { font-size: 13px; color: var(--text-light); margin-bottom: 8px; }
.history-status { display: flex; align-items: center; gap: 8px; }
.history-views { font-size: 12px; color: var(--text-light); }
.history-actions {
  display: flex; border-top: 1px solid var(--border);
}
.history-actions button {
  flex: 1; padding: 12px; font-size: 13px; font-weight: 500;
  color: var(--text-mid); background: none; border: none;
  cursor: pointer; transition: var(--transition);
  border-right: 1px solid var(--border);
}
.history-actions button:last-child { border-right: none; }
.history-actions button:hover { background: rgba(183,110,121,0.05); color: var(--rose-gold); }

/* Empty State */
.empty-state {
  text-align: center; padding: 80px 24px;
}
.empty-icon { font-size: 64px; margin-bottom: 20px; opacity: 0.5; }
.empty-state h3 {
  font-size: 20px; color: var(--text-dark); margin-bottom: 8px;
  font-family: var(--font-body);
}
.empty-state p { font-size: 15px; color: var(--text-mid); margin-bottom: 24px; }

/* Delete Confirm */
.confirm-modal-body { text-align: center; }
.confirm-modal-body p { font-size: 15px; color: var(--text-mid); margin-bottom: 24px; }
.confirm-modal-body .btn-group { display: flex; gap: 12px; justify-content: center; }

@media (max-width:768px) {
  .history-header { padding: 40px 0 24px; }
  .history-header h1 { font-size: 24px; }
  .history-grid { grid-template-columns: 1fr; gap: 16px; }
}
</style>
</head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="common.js"></script>
<script>
var deleteTargetId = null;

// Demo data if none exists
function ensureDemoData(){
  var h = JSON.parse(localStorage.getItem('inv_history')||'[]');
  if(h.length > 0) return h;
  var demos = [
    {id:1,type:'wedding',title:'김민준 ♥ 이서연',date:'2026-05-16',venue:'그랜드 웨딩홀',status:'complete',created:'2026-03-10T09:00:00',template:'classic-01',views:847,thumb:'https://images.unsplash.com/photo-1519741497674-611481863552?w=200&q=60'},
    {id:2,type:'wedding',title:'박지훈 ♥ 최수아',date:'2026-06-20',venue:'더채플 웨딩',status:'editing',created:'2026-03-12T14:30:00',template:'modern-02',views:0,thumb:'https://images.unsplash.com/photo-1511285560929-80b456fea0bc?w=200&q=60'},
    {id:3,type:'baby',title:'김하은 돌잔치',date:'2026-04-05',venue:'베이비파크',status:'complete',created:'2026-03-08T11:00:00',template:'baby-03',views:523,thumb:'https://images.unsplash.com/photo-1544126592-807ade215a0b?w=200&q=60'},
    {id:4,type:'wedding',title:'이준서 ♥ 한유진',date:'2025-12-25',venue:'크리스마스 채플',status:'expired',created:'2025-11-20T16:00:00',template:'winter-04',views:1203,thumb:'https://images.unsplash.com/photo-1465495976277-4387d4b0b4c6?w=200&q=60'},
    {id:5,type:'baby',title:'박서준 100일',date:'2026-03-28',venue:'우리집',status:'complete',created:'2026-03-05T10:00:00',template:'baby-01',views:312,thumb:'https://images.unsplash.com/photo-1555252333-9f8e92e65df9?w=200&q=60'}
  ];
  localStorage.setItem('inv_history', JSON.stringify(demos));
  return demos;
}

function getStatusBadge(status){
  var map = {
    'complete': '<span class="badge badge-success">완료</span>',
    'editing': '<span class="badge badge-warning">제작중</span>',
    'expired': '<span class="badge badge-gray">만료</span>'
  };
  return map[status] || '<span class="badge badge-gray">'+status+'</span>';
}

function formatDate(dateStr){
  var d = new Date(dateStr);
  return d.getFullYear()+'.'+(d.getMonth()+1)+'.'+d.getDate();
}

function renderHistory(filter){
  var items = ensureDemoData();
  if(filter && filter !== 'all'){
    items = items.filter(function(it){ return it.type === filter; });
  }

  if(items.length === 0){
    $('#historyContent').html(
      '<div class="empty-state fade-up visible">'+
        '<div class="empty-icon">💌</div>'+
        '<h3>아직 제작한 청첩장이 없어요</h3>'+
        '<p>지금 바로 아름다운 청첩장을 만들어보세요!</p>'+
        '<a href="create.html" class="btn btn-primary">무료로 시작하기</a>'+
      '</div>'
    );
    return;
  }

  var html = '<div class="history-grid">';
  items.forEach(function(item){
    html += '<div class="history-card fade-up visible" data-type="'+item.type+'" data-id="'+item.id+'">'+
      '<div class="history-card-top">'+
        '<img class="history-thumb" src="'+item.thumb+'" alt="'+item.title+'" onerror="this.src=\'https://placehold.co/80x100/FFFDF7/B76E79?text=Img\'">'+
        '<div class="history-info">'+
          '<h3>'+item.title+'</h3>'+
          '<div class="history-meta">'+formatDate(item.date)+' · '+item.venue+'</div>'+
          '<div class="history-status">'+
            getStatusBadge(item.status)+
            '<span class="history-views">👁️ '+item.views.toLocaleString()+'</span>'+
          '</div>'+
        '</div>'+
      '</div>'+
      '<div class="history-actions">'+
        '<button onclick="editItem('+item.id+')">✏️ 수정</button>'+
        '<button onclick="duplicateItem('+item.id+')">📋 복제</button>'+
        '<button onclick="deleteItem('+item.id+')">🗑️ 삭제</button>'+
        '<button onclick="shareItem('+item.id+')">📤 공유</button>'+
      '</div>'+
    '</div>';
  });
  html += '</div>';
  $('#historyContent').html(html);
}

function editItem(id){
  showToast('제작 페이지로 이동합니다');
  setTimeout(function(){ location.href = 'create.html'; }, 500);
}

function duplicateItem(id){
  var h = JSON.parse(localStorage.getItem('inv_history')||'[]');
  var item = h.find(function(i){ return i.id === id; });
  if(item){
    var dup = JSON.parse(JSON.stringify(item));
    dup.id = Date.now();
    dup.title = item.title + ' (복사본)';
    dup.status = 'editing';
    dup.views = 0;
    dup.created = new Date().toISOString();
    h.unshift(dup);
    localStorage.setItem('inv_history', JSON.stringify(h));
    renderHistory($('.filter-btn.active').data('filter'));
    showToast('청첩장이 복제되었습니다');
  }
}

function deleteItem(id){
  deleteTargetId = id;
  openModal('deleteModal');
}

function shareItem(id){
  copyToClipboard('https://maumcard.kr/inv/'+id);
}

$(function(){
  renderHistory('all');

  // Filter buttons
  $('.filter-btn').on('click', function(){
    $('.filter-btn').removeClass('active');
    $(this).addClass('active');
    renderHistory($(this).data('filter'));
  });

  // Confirm delete
  $('#confirmDelete').on('click', function(){
    if(deleteTargetId){
      var h = JSON.parse(localStorage.getItem('inv_history')||'[]');
      h = h.filter(function(i){ return i.id !== deleteTargetId; });
      localStorage.setItem('inv_history', JSON.stringify(h));
      closeModal('deleteModal');
      renderHistory($('.filter-btn.active').data('filter'));
      showToast('청첩장이 삭제되었습니다');
      deleteTargetId = null;
    }
  });
});
</script>
