<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>VITALITY — 프로그램</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--dark:#0D0D0D;--dark-surface:#1A1A1A;--dark-card:#1E1E1E;--dark-border:#2A2A2A;--lime:#CCFF00;--lime-dim:rgba(204,255,0,0.15);--lime-glow:rgba(204,255,0,0.3);--white:#F5F5F5;--gray:#8A8A8A;--gray-light:#B0B0B0;--red:#FF4757;--blue:#3B82F6;--orange:#FF6B35;--purple:#A855F7;--safe-top:44px;--safe-bottom:34px;--nav-height:72px;--radius:16px;--radius-sm:10px;--font-body:'Pretendard',-apple-system,sans-serif;--font-display:'Sora',sans-serif;--transition:cubic-bezier(0.4,0,0.2,1)}
html{font-size:16px;scroll-behavior:smooth}
body{font-family:var(--font-body);background:var(--dark);color:var(--white);min-height:100dvh;overflow-x:hidden;padding-top:0;padding-bottom:calc(var(--nav-height)+var(--safe-bottom));-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}button{font-family:inherit;border:none;background:none;cursor:pointer;color:inherit}img{max-width:100%;display:block}
::-webkit-scrollbar{width:0;height:0}

@keyframes fadeInUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.92)}to{opacity:1;transform:scale(1)}}
@keyframes checkPop{0%{transform:scale(0)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
@keyframes progressFill{from{width:0}to{width:var(--progress)}}

/* HERO */
.hero{position:relative;height:280px;overflow:hidden}
.hero__img{width:100%;height:100%;object-fit:cover}
.hero__overlay{position:absolute;inset:0;background:linear-gradient(transparent 30%,var(--dark))}
.hero__back{position:absolute;top:var(--safe-top);left:16px;width:40px;height:40px;border-radius:50%;background:rgba(0,0,0,0.4);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:10;-webkit-tap-highlight-color:transparent}
.hero__back:active{transform:scale(0.9)}
.hero__back svg{width:20px;height:20px;stroke:var(--white);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.hero__content{position:absolute;bottom:0;left:0;right:0;padding:0 20px 20px}
.hero__tag{font-size:10px;color:var(--lime);background:var(--lime-dim);padding:4px 10px;border-radius:6px;display:inline-block;margin-bottom:8px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px}
.hero__title{font-size:28px;font-weight:800;line-height:1.2;margin-bottom:4px}
.hero__meta{font-size:13px;color:var(--gray-light);display:flex;gap:12px;align-items:center}

/* MAIN */
.main-content{padding:0 20px;max-width:480px;margin:0 auto}

/* PROGRESS BAR */
.overall-progress{margin:24px 0;animation:fadeInUp 0.5s var(--transition)}
.overall-progress__header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.overall-progress__label{font-size:13px;font-weight:600}
.overall-progress__percent{font-family:var(--font-display);font-size:14px;color:var(--lime);font-weight:700}
.overall-progress__bar{height:10px;background:var(--dark-border);border-radius:5px;overflow:hidden}
.overall-progress__fill{height:100%;background:linear-gradient(90deg,var(--lime),#E5FF66);border-radius:5px;transition:width 0.8s var(--transition)}

/* STATS ROW */
.program-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:28px;animation:fadeInUp 0.5s 0.1s var(--transition) both}
.program-stat{background:var(--dark-card);border:1px solid var(--dark-border);border-radius:var(--radius-sm);padding:12px 8px;text-align:center}
.program-stat__value{font-family:var(--font-display);font-size:18px;font-weight:700;line-height:1;margin-bottom:3px}
.program-stat__label{font-size:10px;color:var(--gray)}

/* WEEK TABS */
.week-tabs{display:flex;gap:8px;margin-bottom:24px;animation:fadeInUp 0.5s 0.15s var(--transition) both}
.week-tab{flex:1;padding:12px 8px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;text-align:center;background:var(--dark-card);border:1px solid var(--dark-border);color:var(--gray-light);transition:all 0.25s;-webkit-tap-highlight-color:transparent}
.week-tab:active{transform:scale(0.95)}
.week-tab--active{background:var(--lime);color:var(--dark);border-color:var(--lime)}
.week-tab__num{font-family:var(--font-display);font-size:16px;font-weight:800;display:block;line-height:1}
.week-tab__label{font-size:10px;margin-top:2px}

/* DAY CHECKLIST */
.day-card{background:var(--dark-card);border:1px solid var(--dark-border);border-radius:var(--radius);margin-bottom:12px;overflow:hidden;animation:fadeInUp 0.4s var(--transition)}
.day-card__header{padding:16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;-webkit-tap-highlight-color:transparent}
.day-card__header:active{opacity:0.8}
.day-card__day{font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px}
.day-card__day-num{font-family:var(--font-display);font-size:12px;color:var(--lime);background:var(--lime-dim);width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700}
.day-card__check-count{font-size:12px;color:var(--gray);font-family:var(--font-display)}
.day-card__exercises{padding:0 16px 16px;display:none}
.day-card__exercises.open{display:block}

/* EXERCISE ITEM */
.exercise-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--dark-border)}
.exercise-item:last-child{border-bottom:none}
.exercise-check{width:28px;height:28px;border-radius:8px;border:2px solid var(--dark-border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s;cursor:pointer;-webkit-tap-highlight-color:transparent}
.exercise-check:active{transform:scale(0.85)}
.exercise-check.checked{background:var(--lime);border-color:var(--lime);animation:checkPop 0.3s var(--transition)}
.exercise-check svg{width:16px;height:16px;stroke:var(--dark);stroke-width:3;fill:none;stroke-linecap:round;stroke-linejoin:round;opacity:0;transition:opacity 0.2s}
.exercise-check.checked svg{opacity:1}
.exercise-info{flex:1}
.exercise-name{font-size:14px;font-weight:500;transition:all 0.2s}
.exercise-name.done{text-decoration:line-through;color:var(--gray)}
.exercise-detail{font-size:12px;color:var(--gray);margin-top:2px}
.exercise-thumb{width:48px;height:48px;border-radius:10px;overflow:hidden;flex-shrink:0;position:relative;cursor:pointer}
.exercise-thumb img{width:100%;height:100%;object-fit:cover}
.exercise-thumb__play{position:absolute;inset:0;background:rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center}
.exercise-thumb__play svg{width:16px;height:16px;fill:var(--white)}

/* VIDEO MODAL */
.video-modal{position:fixed;inset:0;background:rgba(0,0,0,0.8);backdrop-filter:blur(8px);z-index:300;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.3s}
.video-modal.active{opacity:1;pointer-events:all}
.video-modal__content{width:90%;max-width:400px;border-radius:var(--radius);overflow:hidden;background:var(--dark-card)}
.video-modal__img{width:100%;height:200px;object-fit:cover;position:relative}
.video-modal__close{position:absolute;top:12px;right:12px;width:32px;height:32px;border-radius:50%;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center}
.video-modal__close svg{width:16px;height:16px;stroke:var(--white);fill:none;stroke-width:2}
.video-modal__info{padding:16px}
.video-modal__title{font-size:16px;font-weight:600;margin-bottom:4px}
.video-modal__desc{font-size:13px;color:var(--gray)}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:calc(var(--nav-height)+var(--safe-bottom));padding-bottom:var(--safe-bottom);background:rgba(13,13,13,0.92);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid var(--dark-border);display:flex;align-items:center;justify-content:space-around;z-index:100}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 16px;border-radius:12px;transition:all 0.2s;position:relative;-webkit-tap-highlight-color:transparent}
.nav-item:active{transform:scale(0.9)}
.nav-item--active{color:var(--lime)}
.nav-item--active::before{content:'';position:absolute;top:-1px;left:50%;transform:translateX(-50%);width:20px;height:3px;background:var(--lime);border-radius:0 0 3px 3px}
.nav-item__icon svg{width:24px;height:24px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.nav-item__label{font-size:10px;font-weight:500}

@media(min-width:768px){.main-content{max-width:600px}.bottom-nav{max-width:480px;left:50%;transform:translateX(-50%);border-radius:20px 20px 0 0}}
</style>
</head>

</main>

<!-- Video Modal -->
<div class="video-modal" id="videoModal" onclick="closeVideoModal()">

    </div>
  </div>
</div>

// Load checked state from localStorage
const STORAGE_KEY = 'vitality_program_checks';
let checkedState = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');

let currentWeek = 1;

function switchWeek(week, btn) {
  currentWeek = week;
  document.querySelectorAll('.week-tab').forEach(t => t.classList.remove('week-tab--active'));
  btn.classList.add('week-tab--active');
  renderDays();
}

function renderDays() {
  const container = document.getElementById('dayCards');
  const days = programData[currentWeek];
  
  container.innerHTML = days.map((day, di) => {
    const dayKey = `w${currentWeek}_d${di}`;
    const totalEx = day.exercises.length;
    const checkedCount = day.exercises.filter((_, ei) => checkedState[`${dayKey}_e${ei}`]).length;
    
    return `
      <div class="day-card" style="animation:fadeInUp 0.4s ${di*0.08}s var(--transition) both">
        <div class="day-card__header" onclick="toggleDay(this)">
          <div class="day-card__day">
            <span class="day-card__day-num">${day.day.replace('Day ','')}</span>
            ${day.label}
          </div>
          <span class="day-card__check-count">${checkedCount}/${totalEx}</span>
        </div>
        <div class="day-card__exercises" id="dayExercises_${dayKey}">
          ${day.exercises.map((ex, ei) => {
            const exKey = `${dayKey}_e${ei}`;
            const isChecked = checkedState[exKey];
            return `
              <div class="exercise-item">
                <div class="exercise-check ${isChecked?'checked':''}" onclick="toggleCheck('${exKey}',this)">
                  <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
                </div>
                <div class="exercise-info">
                  <div class="exercise-name ${isChecked?'done':''}">${ex.name}</div>
                  <div class="exercise-detail">${ex.detail}</div>
                </div>
                <div class="exercise-thumb" onclick="openVideo('${ex.img}','${ex.name}','${ex.detail}')">
                  <img src="${ex.img}" alt="${ex.name}" loading="lazy">
                  <div class="exercise-thumb__play"><svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg></div>
                </div>
              </div>
            `;
          }).join('')}
        </div>
      </div>
    `;
  }).join('');
  
  // Open first day by default
  const firstExercises = container.querySelector('.day-card__exercises');
  if (firstExercises) firstExercises.classList.add('open');
  
  updateProgress();
}

function toggleDay(header) {
  const exercises = header.nextElementSibling;
  exercises.classList.toggle('open');
}

function toggleCheck(key, el) {
  checkedState[key] = !checkedState[key];
  localStorage.setItem(STORAGE_KEY, JSON.stringify(checkedState));
  
  el.classList.toggle('checked');
  const nameEl = el.nextElementSibling.querySelector('.exercise-name');
  nameEl.classList.toggle('done');
  
  // Update day count
  const dayCard = el.closest('.day-card');
  const checks = dayCard.querySelectorAll('.exercise-check');
  const checked = dayCard.querySelectorAll('.exercise-check.checked');
  dayCard.querySelector('.day-card__check-count').textContent = `${checked.length}/${checks.length}`;
  
  updateProgress();
}

function updateProgress() {
  let total = 0, done = 0;
  for (let w = 1; w <= 4; w++) {
    programData[w].forEach((day, di) => {
      day.exercises.forEach((_, ei) => {
        total++;
        if (checkedState[`w${w}_d${di}_e${ei}`]) done++;
      });
    });
  }
  
  const pct = total > 0 ? Math.round(done / total * 100) : 0;
  document.getElementById('overallPercent').textContent = pct + '%';
  document.getElementById('overallFill').style.width = pct + '%';
  document.getElementById('statExercises').textContent = done;
  
  // Count completed days
  let completedDays = 0;
  for (let w = 1; w <= 4; w++) {
    programData[w].forEach((day, di) => {
      const allDone = day.exercises.every((_, ei) => checkedState[`w${w}_d${di}_e${ei}`]);
      if (allDone) completedDays++;
    });
  }
  document.getElementById('statDays').textContent = completedDays;
  document.getElementById('statStreak').textContent = Math.min(completedDays, 5);
}

function openVideo(img, name, detail) {
  document.getElementById('videoModalImg').src = img;
  document.getElementById('videoModalTitle').textContent = name;
  document.getElementById('videoModalDesc').textContent = detail + ' — 영상 준비 중입니다. 곧 업데이트됩니다!';
  document.getElementById('videoModal').classList.add('active');
}

function closeVideoModal() {
  document.getElementById('videoModal').classList.remove('active');
}

// Init
renderDays();
</script>
