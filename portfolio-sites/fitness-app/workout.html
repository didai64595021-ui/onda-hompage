<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>VITALITY — 운동</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--dark:#0D0D0D;--dark-surface:#1A1A1A;--dark-card:#1E1E1E;--dark-border:#2A2A2A;--lime:#CCFF00;--lime-dim:rgba(204,255,0,0.15);--lime-glow:rgba(204,255,0,0.3);--white:#F5F5F5;--gray:#8A8A8A;--gray-light:#B0B0B0;--red:#FF4757;--blue:#3B82F6;--orange:#FF6B35;--purple:#A855F7;--safe-top:44px;--safe-bottom:34px;--nav-height:72px;--radius:16px;--radius-sm:10px;--font-body:'Pretendard',-apple-system,sans-serif;--font-display:'Sora',sans-serif;--transition:cubic-bezier(0.4,0,0.2,1)}
html{font-size:16px;scroll-behavior:smooth}
body{font-family:var(--font-body);background:var(--dark);color:var(--white);min-height:100dvh;overflow-x:hidden;padding-top:var(--safe-top);padding-bottom:calc(var(--nav-height)+var(--safe-bottom));-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}button{font-family:inherit;border:none;background:none;cursor:pointer;color:inherit}img{max-width:100%;display:block}ul{list-style:none}
::-webkit-scrollbar{width:0;height:0}

@keyframes fadeInUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.92)}to{opacity:1;transform:scale(1)}}

/* HEADER */
.app-header{position:fixed;top:0;left:0;right:0;height:var(--safe-top);background:rgba(13,13,13,0.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100;border-bottom:1px solid var(--dark-border)}
.app-header__logo{font-family:var(--font-display);font-size:18px;font-weight:800;letter-spacing:2px;color:var(--lime)}
.app-header__logo span{color:var(--white);font-weight:300}
.app-header__actions{display:flex;gap:12px;align-items:center}
.app-header__btn{width:36px;height:36px;border-radius:50%;background:var(--dark-surface);display:flex;align-items:center;justify-content:center;transition:all 0.2s}
.app-header__btn:active{transform:scale(0.9)}
.app-header__btn svg{width:18px;height:18px;fill:none;stroke:var(--white);stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.notification-dot{position:absolute;top:6px;right:6px;width:8px;height:8px;background:var(--lime);border-radius:50%;border:2px solid var(--dark)}

/* MAIN */
.main-content{padding:16px 20px;max-width:480px;margin:0 auto}

/* PAGE TITLE */
.page-title{font-size:26px;font-weight:700;margin-bottom:4px;animation:fadeInUp 0.5s var(--transition)}
.page-subtitle{font-size:14px;color:var(--gray-light);margin-bottom:24px;animation:fadeInUp 0.5s 0.05s var(--transition) both}

/* SEARCH */
.search-bar{background:var(--dark-card);border:1px solid var(--dark-border);border-radius:var(--radius-sm);padding:12px 16px;display:flex;align-items:center;gap:10px;margin-bottom:24px;animation:fadeInUp 0.5s 0.1s var(--transition) both}
.search-bar svg{width:18px;height:18px;stroke:var(--gray);fill:none;stroke-width:2;stroke-linecap:round;flex-shrink:0}
.search-bar input{background:none;border:none;color:var(--white);font-size:14px;width:100%;outline:none}
.search-bar input::placeholder{color:var(--gray)}

/* TABS */
.tabs{display:flex;gap:8px;margin-bottom:24px;overflow-x:auto;padding-bottom:4px;animation:fadeInUp 0.5s 0.15s var(--transition) both;-webkit-overflow-scrolling:touch}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:10px 20px;border-radius:24px;font-size:14px;font-weight:600;white-space:nowrap;transition:all 0.25s var(--transition);background:var(--dark-card);border:1px solid var(--dark-border);color:var(--gray-light);-webkit-tap-highlight-color:transparent}
.tab:active{transform:scale(0.95)}
.tab--active{background:var(--lime);color:var(--dark);border-color:var(--lime)}

/* FEATURED */
.featured{margin-bottom:28px;animation:fadeInUp 0.5s 0.2s var(--transition) both}
.featured__card{border-radius:var(--radius);overflow:hidden;position:relative;height:200px;cursor:pointer;transition:transform 0.2s}
.featured__card:active{transform:scale(0.97)}
.featured__img{width:100%;height:100%;object-fit:cover}
.featured__overlay{position:absolute;inset:0;background:linear-gradient(transparent 40%,rgba(0,0,0,0.85));padding:20px;display:flex;flex-direction:column;justify-content:flex-end}
.featured__tag{font-size:10px;color:var(--lime);background:rgba(204,255,0,0.15);padding:3px 10px;border-radius:6px;display:inline-block;width:fit-content;margin-bottom:8px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px}
.featured__name{font-size:20px;font-weight:700;margin-bottom:4px}
.featured__meta{font-size:13px;color:var(--gray-light)}
.featured__btn{position:absolute;top:16px;right:16px;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,0.15);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center}
.featured__btn svg{width:18px;height:18px;stroke:var(--white);fill:none;stroke-width:2}

/* SECTION */
.section-label{font-size:13px;color:var(--gray);text-transform:uppercase;letter-spacing:1.5px;font-family:var(--font-display);margin-bottom:14px}

/* WORKOUT LIST */
.workout-list{display:flex;flex-direction:column;gap:12px;margin-bottom:28px}
.workout-item{background:var(--dark-card);border:1px solid var(--dark-border);border-radius:var(--radius);padding:16px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:all 0.2s var(--transition);-webkit-tap-highlight-color:transparent}
.workout-item:active{transform:scale(0.97);background:var(--dark-surface)}
.workout-item__thumb{width:64px;height:64px;border-radius:12px;overflow:hidden;flex-shrink:0;position:relative}
.workout-item__thumb img{width:100%;height:100%;object-fit:cover}
.workout-item__thumb-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.2);display:flex;align-items:center;justify-content:center}
.workout-item__thumb-overlay svg{width:20px;height:20px;fill:var(--white);opacity:0.8}
.workout-item__info{flex:1;min-width:0}
.workout-item__name{font-size:15px;font-weight:600;margin-bottom:3px}
.workout-item__desc{font-size:12px;color:var(--gray);margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.workout-item__tags{display:flex;gap:6px;flex-wrap:wrap}
.workout-item__tag{font-size:10px;padding:3px 8px;border-radius:6px;font-weight:500}
.workout-item__tag--time{background:rgba(59,130,246,0.12);color:var(--blue)}
.workout-item__tag--cal{background:rgba(204,255,0,0.12);color:var(--lime)}
.workout-item__tag--level{background:rgba(168,85,247,0.12);color:var(--purple)}
.workout-item__arrow{width:32px;height:32px;border-radius:50%;background:var(--dark-border);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.workout-item__arrow svg{width:16px;height:16px;stroke:var(--gray-light);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* START BTN */
.start-workout-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:16px;background:var(--lime);color:var(--dark);font-size:16px;font-weight:700;border-radius:var(--radius);transition:all 0.2s var(--transition);margin-bottom:20px;-webkit-tap-highlight-color:transparent}
.start-workout-btn:active{transform:scale(0.97);opacity:0.9}
.start-workout-btn svg{width:20px;height:20px;fill:var(--dark)}

/* QUICK START */
.quick-start{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:28px;animation:fadeInUp 0.5s 0.25s var(--transition) both}
.quick-card{background:var(--dark-card);border:1px solid var(--dark-border);border-radius:var(--radius);padding:20px 16px;text-align:center;cursor:pointer;transition:all 0.2s var(--transition);-webkit-tap-highlight-color:transparent}
.quick-card:active{transform:scale(0.95);background:var(--dark-surface)}
.quick-card__icon{font-size:36px;margin-bottom:10px}
.quick-card__name{font-size:14px;font-weight:600;margin-bottom:4px}
.quick-card__desc{font-size:11px;color:var(--gray)}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:calc(var(--nav-height)+var(--safe-bottom));padding-bottom:var(--safe-bottom);background:rgba(13,13,13,0.92);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid var(--dark-border);display:flex;align-items:center;justify-content:space-around;z-index:100}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 16px;border-radius:12px;transition:all 0.2s;-webkit-tap-highlight-color:transparent}
.nav-item:active{transform:scale(0.9)}
.nav-item--active{color:var(--lime)}
.nav-item--active::before{content:'';position:absolute;top:-1px;left:50%;transform:translateX(-50%);width:20px;height:3px;background:var(--lime);border-radius:0 0 3px 3px}
.nav-item{position:relative}
.nav-item__icon svg{width:24px;height:24px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.nav-item__label{font-size:10px;font-weight:500}

/* RESPONSIVE */
@media(min-width:768px){.main-content{max-width:600px}.quick-start{grid-template-columns:repeat(4,1fr)}.bottom-nav{max-width:480px;left:50%;transform:translateX(-50%);border-radius:20px 20px 0 0}}
</style>
</head>

      {name:'리스토어 요가',desc:'깊은 이완과 회복',time:'30분',cal:'100 kcal',level:'초급',img:'https://images.unsplash.com/photo-1510894347713-fc3ed6fdf539?w=200&h=200&fit=crop'},
      {name:'힙 오프너',desc:'골반과 엉덩이 유연성',time:'25분',cal:'120 kcal',level:'초급',img:'https://images.unsplash.com/photo-1575052814086-f385e2e2ad1b?w=200&h=200&fit=crop'},
      {name:'밸런스 플로우',desc:'균형감각 향상 시퀀스',time:'35분',cal:'160 kcal',level:'중급',img:'https://images.unsplash.com/photo-1562088287-bde35a1ea917?w=200&h=200&fit=crop'}
    ]
  }
};

let currentTab = 'running';
let selectedWorkout = null;

function switchTab(tab) {
  currentTab = tab;
  // Update tabs
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('tab--active', t.dataset.tab === tab);
  });
  // Update quick cards
  document.querySelectorAll('.quick-card').forEach(c => {
    c.style.borderColor = c.dataset.tab === tab ? 'var(--lime)' : 'var(--dark-border)';
  });
  
  const data = workoutData[tab];
  
  // Update featured
  const feat = document.getElementById('featured');
  feat.querySelector('.featured__img').src = data.featured.img;
  feat.querySelector('.featured__tag').textContent = data.featured.tag;
  feat.querySelector('.featured__name').textContent = data.featured.name;
  feat.querySelector('.featured__meta').textContent = data.featured.meta;
  feat.querySelector('.featured__card').onclick = () => {
    location.href = `tracking.html?type=${tab}&name=${encodeURIComponent(data.featured.name)}`;
  };
  feat.style.animation = 'none'; feat.offsetHeight; feat.style.animation = 'scaleIn 0.3s var(--transition)';

  // Update list
  document.getElementById('sectionLabel').textContent = data.label;
  renderWorkoutList(data.items, tab);
  
  // Update start button
  document.getElementById('startBtn').href = `tracking.html?type=${tab}&name=${encodeURIComponent(data.items[0].name)}`;
}

function renderWorkoutList(items, type) {
  const list = document.getElementById('workoutList');
  list.innerHTML = items.map((item, i) => `
    <div class="workout-item" onclick="selectWorkout('${type}','${item.name.replace(/'/g,"\\'")}',this)" style="animation:fadeInUp 0.4s ${i*0.06}s var(--transition) both">
      <div class="workout-item__thumb">
        <img src="${item.img}" alt="${item.name}" loading="lazy">
        <div class="workout-item__thumb-overlay"><svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg></div>
      </div>
      <div class="workout-item__info">
        <div class="workout-item__name">${item.name}</div>
        <div class="workout-item__desc">${item.desc}</div>
        <div class="workout-item__tags">
          <span class="workout-item__tag workout-item__tag--time">${item.time}</span>
          <span class="workout-item__tag workout-item__tag--cal">${item.cal}</span>
          <span class="workout-item__tag workout-item__tag--level">${item.level}</span>
        </div>
      </div>
      <div class="workout-item__arrow"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
    </div>
  `).join('');
}

function selectWorkout(type, name, el) {
  selectedWorkout = {type, name};
  document.querySelectorAll('.workout-item').forEach(w => w.style.borderColor = 'var(--dark-border)');
  el.style.borderColor = 'var(--lime)';
  document.getElementById('startBtn').href = `tracking.html?type=${type}&name=${encodeURIComponent(name)}`;
}

// Search
document.getElementById('searchInput').addEventListener('input', function(e) {
  const q = e.target.value.toLowerCase();
  document.querySelectorAll('.workout-item').forEach(item => {
    const name = item.querySelector('.workout-item__name').textContent.toLowerCase();
    const desc = item.querySelector('.workout-item__desc').textContent.toLowerCase();
    item.style.display = (name.includes(q) || desc.includes(q)) ? 'flex' : 'none';
  });
});

// Init
switchTab('running');
</script>
</body>
</html>
