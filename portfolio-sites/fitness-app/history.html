<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>VITALITY — 기록</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --dark:#0D0D0D;--dark-surface:#1A1A1A;--dark-card:#1E1E1E;--dark-border:#2A2A2A;
  --lime:#CCFF00;--lime-dim:rgba(204,255,0,0.15);--lime-glow:rgba(204,255,0,0.3);
  --white:#F5F5F5;--gray:#8A8A8A;--gray-light:#B0B0B0;
  --red:#FF4757;--blue:#3B82F6;--orange:#FF6B35;--purple:#A855F7;
  --safe-top:44px;--safe-bottom:34px;--nav-height:72px;
  --radius:16px;--radius-sm:10px;
  --font-body:'Pretendard',-apple-system,sans-serif;
  --font-display:'Sora',sans-serif;
  --transition:cubic-bezier(0.4,0,0.2,1)
}
html{font-size:16px;scroll-behavior:smooth}
body{
  font-family:var(--font-body);background:var(--dark);color:var(--white);
  min-height:100dvh;overflow-x:hidden;word-break:keep-all;
  padding-top:var(--safe-top);padding-bottom:calc(var(--nav-height)+var(--safe-bottom));
  -webkit-font-smoothing:antialiased
}
a{color:inherit;text-decoration:none}
button{font-family:inherit;border:none;background:none;cursor:pointer;color:inherit}
::-webkit-scrollbar{width:0;height:0}

@keyframes fadeInUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.92)}to{opacity:1;transform:scale(1)}}
@keyframes flameFlicker{
  0%,100%{transform:scale(1) rotate(-2deg)}
  25%{transform:scale(1.05) rotate(2deg)}
  50%{transform:scale(0.95) rotate(-1deg)}
  75%{transform:scale(1.03) rotate(1deg)}
}
@keyframes countUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* HEADER */
.app-header{
  position:fixed;top:0;left:0;right:0;height:var(--safe-top);
  background:rgba(13,13,13,0.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;z-index:100;border-bottom:1px solid var(--dark-border)
}
.app-header__logo{font-family:var(--font-display);font-size:18px;font-weight:800;letter-spacing:2px;color:var(--lime)}
.app-header__logo span{color:var(--white);font-weight:300}

.main-content{padding:16px 20px;max-width:480px;margin:0 auto}
.page-title{font-size:26px;font-weight:700;margin-bottom:4px;animation:fadeInUp 0.5s var(--transition)}
.page-subtitle{font-size:14px;color:var(--gray-light);margin-bottom:24px;animation:fadeInUp 0.5s 0.05s var(--transition) both}

/* STREAK SECTION */
.streak-section{
  background:linear-gradient(135deg,rgba(204,255,0,0.08),rgba(255,71,87,0.05));
  border:1px solid rgba(204,255,0,0.15);border-radius:var(--radius);
  padding:20px;margin-bottom:24px;display:flex;align-items:center;gap:16px;
  animation:fadeInUp 0.5s 0.08s var(--transition) both
}
.streak-flame{font-size:40px;animation:flameFlicker 1.5s ease-in-out infinite}
.streak-info{flex:1}
.streak-info__label{font-size:11px;color:var(--gray);text-transform:uppercase;letter-spacing:1px;font-family:var(--font-display);margin-bottom:4px}
.streak-info__value{font-family:var(--font-display);font-size:32px;font-weight:800;color:var(--lime);line-height:1}
.streak-info__sub{font-size:12px;color:var(--gray-light);margin-top:4px}
.streak-bar{flex-shrink:0;display:flex;gap:3px}
.streak-dot{
  width:10px;height:10px;border-radius:50%;background:var(--dark-border);
  transition:all 0.3s
}
.streak-dot--active{background:var(--lime);box-shadow:0 0 6px var(--lime-glow)}
.streak-dot--today{background:var(--lime);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}

/* SUMMARY CARDS */
.summary-row{
  display:grid;grid-template-columns:repeat(3,1fr);gap:10px;
  margin-bottom:24px;animation:fadeInUp 0.5s 0.1s var(--transition) both
}
.summary-card{
  background:var(--dark-card);border:1px solid var(--dark-border);
  border-radius:var(--radius-sm);padding:16px 10px;text-align:center;
  position:relative;overflow:hidden
}
.summary-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  border-radius:3px 3px 0 0
}
.summary-card--lime::before{background:var(--lime)}
.summary-card--blue::before{background:var(--blue)}
.summary-card--red::before{background:var(--red)}
.summary-card__icon{font-size:18px;margin-bottom:6px}
.summary-card__value{
  font-family:var(--font-display);font-size:22px;font-weight:700;
  line-height:1;margin-bottom:4px
}
.summary-card__value--lime{color:var(--lime)}
.summary-card__value--blue{color:var(--blue)}
.summary-card__value--red{color:var(--red)}
.summary-card__label{font-size:10px;color:var(--gray);text-transform:uppercase;letter-spacing:0.5px}
.summary-card__change{
  font-size:10px;font-family:var(--font-display);margin-top:4px;
  padding:2px 6px;border-radius:4px;display:inline-block
}
.summary-card__change--up{color:#22C55E;background:rgba(34,197,94,0.12)}
.summary-card__change--down{color:var(--red);background:rgba(255,71,87,0.12)}

/* FILTER TABS */
.filter-tabs{
  display:flex;gap:8px;margin-bottom:20px;overflow-x:auto;
  padding-bottom:4px;animation:fadeInUp 0.5s 0.12s var(--transition) both;
  -webkit-overflow-scrolling:touch
}
.filter-tabs::-webkit-scrollbar{display:none}
.filter-tab{
  padding:8px 16px;border-radius:20px;font-size:13px;font-weight:600;
  white-space:nowrap;transition:all 0.25s var(--transition);
  background:var(--dark-card);border:1px solid var(--dark-border);
  color:var(--gray-light);-webkit-tap-highlight-color:transparent;
  display:flex;align-items:center;gap:6px
}
.filter-tab:active{transform:scale(0.95)}
.filter-tab--active{background:var(--lime);color:var(--dark);border-color:var(--lime)}
.filter-tab__count{
  font-size:11px;font-family:var(--font-display);font-weight:700;
  background:rgba(0,0,0,0.15);padding:1px 6px;border-radius:10px
}
.filter-tab--active .filter-tab__count{background:rgba(0,0,0,0.2)}

/* CALENDAR */
.calendar{
  background:var(--dark-card);border:1px solid var(--dark-border);
  border-radius:var(--radius);padding:20px;margin-bottom:24px;
  animation:fadeInUp 0.5s 0.15s var(--transition) both
}
.calendar__header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.calendar__nav{
  width:36px;height:36px;border-radius:50%;background:var(--dark-surface);
  display:flex;align-items:center;justify-content:center;
  transition:all 0.2s;-webkit-tap-highlight-color:transparent
}
.calendar__nav:active{transform:scale(0.9)}
.calendar__nav svg{width:18px;height:18px;stroke:var(--white);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.calendar__month{font-family:var(--font-display);font-size:16px;font-weight:600}
.calendar__weekdays{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:8px}
.calendar__weekday{text-align:center;font-size:11px;color:var(--gray);font-family:var(--font-display);padding:4px 0}
.calendar__days{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.calendar__day{
  aspect-ratio:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;border-radius:10px;font-size:14px;
  font-family:var(--font-display);cursor:pointer;transition:all 0.2s;
  -webkit-tap-highlight-color:transparent;position:relative;gap:3px
}
.calendar__day:active{transform:scale(0.9)}
.calendar__day--empty{pointer-events:none}
.calendar__day--today{background:var(--dark-surface);font-weight:700;color:var(--lime)}
.calendar__day--selected{background:var(--lime)!important;color:var(--dark)!important;font-weight:700}
.calendar__day--selected .calendar__dot{background:var(--dark)!important}
.calendar__day--has-workout .calendar__dot{display:block}
.calendar__dot{display:none;width:5px;height:5px;border-radius:50%;background:var(--lime)}
.calendar__day--other{color:var(--gray);opacity:0.4}

/* DAY DETAIL */
.day-detail{
  background:var(--dark-card);border:1px solid var(--dark-border);
  border-radius:var(--radius);padding:20px;margin-bottom:24px;display:none
}
.day-detail.active{display:block;animation:scaleIn 0.3s var(--transition)}
.day-detail__title{font-size:15px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.day-detail__title span{color:var(--lime)}
.day-detail__empty{font-size:13px;color:var(--gray);text-align:center;padding:20px 0}
.day-workout{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--dark-border)}
.day-workout:last-child{border-bottom:none}
.day-workout__icon{
  width:40px;height:40px;border-radius:10px;display:flex;
  align-items:center;justify-content:center;font-size:18px;flex-shrink:0
}
.day-workout__icon--running{background:rgba(204,255,0,0.12)}
.day-workout__icon--strength{background:rgba(59,130,246,0.12)}
.day-workout__icon--hiit{background:rgba(255,71,87,0.12)}
.day-workout__icon--yoga{background:rgba(168,85,247,0.12)}
.day-workout__info{flex:1}
.day-workout__name{font-size:14px;font-weight:600;margin-bottom:2px}
.day-workout__meta{font-size:12px;color:var(--gray);display:flex;gap:10px}

/* WEEKLY BAR CHART */
.chart-section{margin-bottom:24px;animation:fadeInUp 0.5s 0.2s var(--transition) both}
.section-label{
  font-size:13px;color:var(--gray);text-transform:uppercase;
  letter-spacing:1.5px;font-family:var(--font-display);margin-bottom:14px
}
.bar-chart{
  background:var(--dark-card);border:1px solid var(--dark-border);
  border-radius:var(--radius);padding:20px
}
.bar-chart__header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.bar-chart__title{font-size:14px;font-weight:600}
.bar-chart__toggle{display:flex;gap:4px}
.bar-chart__toggle-btn{
  padding:6px 12px;border-radius:8px;font-size:12px;font-weight:500;
  background:var(--dark-surface);color:var(--gray-light);transition:all 0.2s
}
.bar-chart__toggle-btn--active{background:var(--lime-dim);color:var(--lime)}
.bar-chart__bars{display:flex;align-items:flex-end;gap:6px;height:120px;padding-top:10px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%}
.bar-col__bar{
  width:100%;border-radius:4px 4px 0 0;background:var(--lime);
  transition:height 0.6s var(--transition);margin-top:auto;min-height:4px;
  position:relative;cursor:pointer
}
.bar-col__bar:hover{opacity:0.8}
.bar-col__bar::after{
  content:attr(data-value);position:absolute;top:-18px;left:50%;
  transform:translateX(-50%);font-size:10px;color:var(--gray-light);
  font-family:var(--font-display);white-space:nowrap;opacity:0;transition:opacity 0.2s
}
.bar-col:hover .bar-col__bar::after{opacity:1}
.bar-col__label{font-size:10px;color:var(--gray);font-family:var(--font-display)}

/* MONTHLY TREND */
.trend-section{margin-bottom:24px;animation:fadeInUp 0.5s 0.22s var(--transition) both}
.trend-card{
  background:var(--dark-card);border:1px solid var(--dark-border);
  border-radius:var(--radius);padding:20px
}
.trend-card__header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.trend-card__title{font-size:14px;font-weight:600}
.trend-card__value{font-family:var(--font-display);font-size:14px;font-weight:700;color:var(--lime)}
.trend-graph{height:100px;display:flex;align-items:flex-end;gap:2px;position:relative}
.trend-graph__line{position:absolute;bottom:0;left:0;right:0;height:1px;border-bottom:1px dashed var(--dark-border)}
.trend-bar{
  flex:1;border-radius:3px 3px 0 0;min-height:4px;
  transition:height 0.6s var(--transition);position:relative;cursor:pointer
}
.trend-bar:hover::after{
  content:attr(data-label);position:absolute;top:-20px;left:50%;
  transform:translateX(-50%);font-size:9px;color:var(--white);
  background:var(--dark-surface);padding:2px 6px;border-radius:4px;
  white-space:nowrap;z-index:5
}
.trend-labels{display:flex;justify-content:space-between;margin-top:8px}
.trend-labels span{font-size:10px;color:var(--gray);font-family:var(--font-display)}

/* PERSONAL BESTS */
.bests-section{margin-bottom:24px;animation:fadeInUp 0.5s 0.25s var(--transition) both}
.bests-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.best-card{
  background:var(--dark-card);border:1px solid var(--dark-border);
  border-radius:var(--radius);padding:16px;position:relative;overflow:hidden
}
.best-card__crown{position:absolute;top:8px;right:8px;font-size:16px}
.best-card__icon{font-size:24px;margin-bottom:8px}
.best-card__label{font-size:11px;color:var(--gray);margin-bottom:4px}
.best-card__value{font-family:var(--font-display);font-size:20px;font-weight:700;line-height:1}
.best-card__value--lime{color:var(--lime)}
.best-card__value--blue{color:var(--blue)}
.best-card__value--red{color:var(--red)}
.best-card__value--orange{color:var(--orange)}
.best-card__date{font-size:10px;color:var(--gray);margin-top:4px}

/* HISTORY LIST */
.history-section{animation:fadeInUp 0.5s 0.28s var(--transition) both}
.history-item{
  background:var(--dark-card);border:1px solid var(--dark-border);
  border-radius:var(--radius);padding:16px;margin-bottom:10px;
  display:flex;align-items:center;gap:14px;cursor:pointer;
  transition:all 0.2s;-webkit-tap-highlight-color:transparent
}
.history-item:active{transform:scale(0.97)}
.history-item__icon{
  width:48px;height:48px;border-radius:12px;display:flex;
  align-items:center;justify-content:center;font-size:22px;flex-shrink:0
}
.history-item__icon--running{background:rgba(204,255,0,0.12)}
.history-item__icon--strength{background:rgba(59,130,246,0.12)}
.history-item__icon--hiit{background:rgba(255,71,87,0.12)}
.history-item__icon--yoga{background:rgba(168,85,247,0.12)}
.history-item__info{flex:1;min-width:0}
.history-item__name{font-size:15px;font-weight:600;margin-bottom:3px}
.history-item__date{font-size:12px;color:var(--gray);margin-bottom:4px}
.history-item__stats{display:flex;gap:12px;font-size:12px;color:var(--gray-light)}
.history-item__stat{display:flex;align-items:center;gap:3px}
.history-empty{text-align:center;padding:40px 20px;color:var(--gray)}
.history-empty__icon{font-size:48px;margin-bottom:12px}
.history-empty__text{font-size:14px;margin-bottom:16px}
.history-empty__btn{
  display:inline-block;padding:12px 24px;background:var(--lime);
  color:var(--dark);border-radius:var(--radius-sm);font-weight:600;font-size:14px
}
.load-more-btn{
  display:block;width:100%;padding:14px;background:var(--dark-card);
  border:1px solid var(--dark-border);border-radius:var(--radius-sm);
  font-size:14px;font-weight:600;color:var(--gray-light);
  text-align:center;margin-top:12px;transition:all 0.2s
}
.load-more-btn:active{background:var(--dark-surface)}

/* BOTTOM NAV */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;
  height:calc(var(--nav-height)+var(--safe-bottom));padding-bottom:var(--safe-bottom);
  background:rgba(13,13,13,0.92);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-top:1px solid var(--dark-border);
  display:flex;align-items:center;justify-content:space-around;z-index:100
}
.nav-item{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:8px 16px;border-radius:12px;transition:all 0.2s;
  position:relative;-webkit-tap-highlight-color:transparent
}
.nav-item:active{transform:scale(0.9)}
.nav-item--active{color:var(--lime)}
.nav-item--active::before{
  content:'';position:absolute;top:-1px;left:50%;transform:translateX(-50%);
  width:20px;height:3px;background:var(--lime);border-radius:0 0 3px 3px
}
.nav-item__icon svg{width:24px;height:24px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.nav-item__label{font-size:10px;font-weight:500}

@media(min-width:768px){
  .main-content{max-width:600px}
  .summary-row{grid-template-columns:repeat(4,1fr)}
  .bests-grid{grid-template-columns:repeat(4,1fr)}
  .bottom-nav{max-width:480px;left:50%;transform:translateX(-50%);border-radius:20px 20px 0 0}
}
</style>
</head>
<body>

<header class="app-header">
  <div class="app-header__logo">VITAL<span>ITY</span></div>
</header>

<main class="main-content">
  <h1 class="page-title">운동 기록 📊</h1>
  <p class="page-subtitle">꾸준함이 실력이 됩니다</p>

  <!-- Streak -->
  <div class="streak-section">
    <div class="streak-flame">🔥</div>
    <div class="streak-info">
      <div class="streak-info__label">연속 출석</div>
      <div class="streak-info__value" id="streakCount">0일</div>
      <div class="streak-info__sub" id="streakMsg">운동을 시작해보세요!</div>
    </div>
    <div class="streak-bar" id="streakBar"></div>
  </div>

  <!-- Summary -->
  <div class="summary-row">
    <div class="summary-card summary-card--lime">
      <div class="summary-card__icon">💪</div>
      <div class="summary-card__value summary-card__value--lime" id="totalWorkouts">0</div>
      <div class="summary-card__label">총 운동</div>
      <span class="summary-card__change summary-card__change--up" id="workoutChange"></span>
    </div>
    <div class="summary-card summary-card--blue">
      <div class="summary-card__icon">⏱</div>
      <div class="summary-card__value summary-card__value--blue" id="totalTime">0h</div>
      <div class="summary-card__label">총 시간</div>
      <span class="summary-card__change summary-card__change--up" id="timeChange"></span>
    </div>
    <div class="summary-card summary-card--red">
      <div class="summary-card__icon">🔥</div>
      <div class="summary-card__value summary-card__value--red" id="totalCal">0</div>
      <div class="summary-card__label">총 칼로리</div>
      <span class="summary-card__change summary-card__change--up" id="calChange"></span>
    </div>
  </div>

  <!-- Filter Tabs -->
  <div class="filter-tabs" id="filterTabs">
    <button class="filter-tab filter-tab--active" data-filter="all" onclick="filterHistory('all',this)">
      전체 <span class="filter-tab__count" id="countAll">0</span>
    </button>
    <button class="filter-tab" data-filter="running" onclick="filterHistory('running',this)">
      🏃 러닝 <span class="filter-tab__count" id="countRunning">0</span>
    </button>
    <button class="filter-tab" data-filter="strength" onclick="filterHistory('strength',this)">
      🏋️ 근력 <span class="filter-tab__count" id="countStrength">0</span>
    </button>
    <button class="filter-tab" data-filter="hiit" onclick="filterHistory('hiit',this)">
      ⚡ HIIT <span class="filter-tab__count" id="countHiit">0</span>
    </button>
    <button class="filter-tab" data-filter="yoga" onclick="filterHistory('yoga',this)">
      🧘 요가 <span class="filter-tab__count" id="countYoga">0</span>
    </button>
  </div>

  <!-- Calendar -->
  <div class="calendar" id="calendar">
    <div class="calendar__header">
      <button class="calendar__nav" onclick="changeMonth(-1)">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <span class="calendar__month" id="calendarMonth"></span>
      <button class="calendar__nav" onclick="changeMonth(1)">
        <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>
    <div class="calendar__weekdays">
      <div class="calendar__weekday">일</div>
      <div class="calendar__weekday">월</div>
      <div class="calendar__weekday">화</div>
      <div class="calendar__weekday">수</div>
      <div class="calendar__weekday">목</div>
      <div class="calendar__weekday">금</div>
      <div class="calendar__weekday">토</div>
    </div>
    <div class="calendar__days" id="calendarDays"></div>
  </div>

  <!-- Day Detail -->
  <div class="day-detail" id="dayDetail">
    <div class="day-detail__title" id="dayDetailTitle"></div>
    <div id="dayDetailContent"></div>
  </div>

  <!-- Weekly Bar Chart -->
  <div class="chart-section">
    <p class="section-label">Weekly Activity</p>
    <div class="bar-chart">
      <div class="bar-chart__header">
        <span class="bar-chart__title">칼로리 소모</span>
        <div class="bar-chart__toggle">
          <button class="bar-chart__toggle-btn bar-chart__toggle-btn--active" onclick="setChartView('week',this)">주간</button>

<script>
/* ============================================
   VITALITY — History & Calendar (Upgraded)
   ============================================ */

// ─── Load/Generate History Data ───
let history = JSON.parse(localStorage.getItem('vitality_history') || '[]');
if (history.length === 0) {
  const types = ['running','strength','hiit','yoga'];
  const names = {
    running:['모닝 러닝','인터벌 러닝','이지 러닝','템포 러닝','롱 러닝','힐 러닝'],
    strength:['상체 푸쉬','하체 데이','전신 근력','코어 블래스터','덤벨 온리','파워 리프팅'],
    hiit:['타바타','EMOM','풀 바디 HIIT','버피 챌린지','점프 서킷','스프린트 인터벌'],
    yoga:['모닝 빈야사','파워 요가','리스토어 요가','힙 오프너','밸런스 플로우','음양 요가']
  };
  for (let d = 0; d < 60; d++) {
    if (Math.random() < 0.3) continue;
    const date = new Date();
    date.setDate(date.getDate() - d);
    date.setHours(6 + Math.floor(Math.random()*14), Math.floor(Math.random()*60));
    const type = types[Math.floor(Math.random()*types.length)];
    const name = names[type][Math.floor(Math.random()*names[type].length)];
    const dur = 1200 + Math.floor(Math.random()*2400);
    history.push({
      type, name,
      duration: dur,
      calories: Math.round(dur * (0.12 + Math.random()*0.1)),
      heartRate: 120 + Math.floor(Math.random()*30),
      distance: type === 'running' ? parseFloat((dur*0.0028*(0.8+Math.random()*0.4)).toFixed(2)) : 0,
      date: date.toISOString()
    });
  }
  localStorage.setItem('vitality_history', JSON.stringify(history));
}

// ─── Summary Stats ───
const totalWorkouts = history.length;
const totalSeconds = history.reduce((a,h) => a + h.duration, 0);
const totalCal = history.reduce((a,h) => a + h.calories, 0);
document.getElementById('totalWorkouts').textContent = totalWorkouts;
document.getElementById('totalTime').textContent = Math.round(totalSeconds/3600) + 'h';
document.getElementById('totalCal').textContent = totalCal.toLocaleString();

// Weekly comparison
const now = new Date();
const weekMs = 7*24*60*60*1000;
const thisWeek = history.filter(h => (now - new Date(h.date)) < weekMs);
const lastWeek = history.filter(h => {
  const diff = now - new Date(h.date);
  return diff >= weekMs && diff < weekMs*2;
});
const twDiff = thisWeek.length - lastWeek.length;
document.getElementById('workoutChange').textContent = twDiff >= 0 ? `+${twDiff}` : `${twDiff}`;
document.getElementById('workoutChange').className = `summary-card__change summary-card__change--${twDiff>=0?'up':'down'}`;

// Filter counts
const typeCounts = {all:history.length, running:0, strength:0, hiit:0, yoga:0};
history.forEach(h => { if(typeCounts[h.type]!==undefined) typeCounts[h.type]++; });
document.getElementById('countAll').textContent = typeCounts.all;
document.getElementById('countRunning').textContent = typeCounts.running;
document.getElementById('countStrength').textContent = typeCounts.strength;
document.getElementById('countHiit').textContent = typeCounts.hiit;
document.getElementById('countYoga').textContent = typeCounts.yoga;

// ─── Streak Calculation ───
function calcStreak() {
  const dates = history
    .map(h => new Date(h.date).toISOString().slice(0,10))
    .filter((v,i,a) => a.indexOf(v)===i)
    .sort().reverse();

  const today = new Date().toISOString().slice(0,10);
  const yesterday = new Date(Date.now()-86400000).toISOString().slice(0,10);

  let streak = 0;
  if (dates[0] === today || dates[0] === yesterday) {
    streak = 1;
    for (let i=1;i<dates.length;i++) {
      const diff = (new Date(dates[i-1]) - new Date(dates[i])) / 86400000;
      if (diff === 1) streak++;
      else break;
    }
  }

  // Max streak
  let maxStreak = 1, cur = 1;
  for (let i=1;i<dates.length;i++) {
    const diff = (new Date(dates[i-1]) - new Date(dates[i])) / 86400000;
    if (diff === 1) { cur++; maxStreak = Math.max(maxStreak, cur); }
    else cur = 1;
  }

  document.getElementById('streakCount').textContent = streak + '일';
  document.getElementById('streakMsg').textContent =
    streak >= 7 ? '🏆 일주일 연속! 대단해요!' :
    streak >= 3 ? '💪 좋은 흐름이에요!' :
    streak >= 1 ? '🌟 계속 이어가세요!' :
    '운동을 시작해보세요!';

  // Streak dots (last 7 days)
  const bar = document.getElementById('streakBar');
  bar.innerHTML = '';
  for (let i=6;i>=0;i--) {
    const d = new Date(Date.now()-i*86400000).toISOString().slice(0,10);
    const dot = document.createElement('span');
    dot.className = 'streak-dot' + (dates.includes(d) ? ' streak-dot--active' : '') + (i===0 ? ' streak-dot--today' : '');
    bar.appendChild(dot);
  }

  document.getElementById('bestStreak').textContent = maxStreak + '일';
}
calcStreak();

// ─── Personal Bests ───
function calcBests() {
  let bestCal = {val:0,date:''}, bestDur = {val:0,date:''}, bestRun = {val:0,date:''};
  history.forEach(h => {
    const d = new Date(h.date);
    const ds = `${d.getMonth()+1}/${d.getDate()}`;
    if (h.calories > bestCal.val) bestCal = {val:h.calories,date:ds};
    if (h.duration > bestDur.val) bestDur = {val:h.duration,date:ds};
    if (h.type==='running' && h.distance > bestRun.val) bestRun = {val:h.distance,date:ds};
  });
  document.getElementById('bestCalories').textContent = bestCal.val + ' kcal';
  document.getElementById('bestCaloriesDate').textContent = bestCal.date;
  document.getElementById('bestDuration').textContent = Math.round(bestDur.val/60) + '분';
  document.getElementById('bestDurationDate').textContent = bestDur.date;
  document.getElementById('bestRunning').textContent = bestRun.val.toFixed(1) + ' km';
  document.getElementById('bestRunningDate').textContent = bestRun.date || '--';
}
calcBests();

// ─── Calendar ───
let currentYear, currentMonth;
const today = new Date();
currentYear = today.getFullYear();
currentMonth = today.getMonth();

function getWorkoutDates() {
  const dates = {};
  history.forEach(h => {
    const d = new Date(h.date);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    if (!dates[key]) dates[key] = [];
    dates[key].push(h);
  });
  return dates;
}
const workoutDates = getWorkoutDates();

function renderCalendar() {
  const monthNames = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('calendarMonth').textContent = `${currentYear}년 ${monthNames[currentMonth]}`;
  const firstDay = new Date(currentYear, currentMonth, 1).getDay();
  const daysInMonth = new Date(currentYear, currentMonth+1, 0).getDate();
  const prevDays = new Date(currentYear, currentMonth, 0).getDate();
  const container = document.getElementById('calendarDays');
  container.innerHTML = '';
  for (let i=firstDay-1;i>=0;i--) {
    const el = document.createElement('div');
    el.className = 'calendar__day calendar__day--other';
    el.innerHTML = `<span>${prevDays-i}</span>`;
    container.appendChild(el);
  }
  const todayDate = today.getDate(), todayMonth = today.getMonth(), todayYear = today.getFullYear();
  for (let d=1;d<=daysInMonth;d++) {
    const el = document.createElement('div');
    const key = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const hasWorkout = workoutDates[key];
    const isToday = d===todayDate && currentMonth===todayMonth && currentYear===todayYear;
    let cls = 'calendar__day';
    if (isToday) cls += ' calendar__day--today';
    if (hasWorkout) cls += ' calendar__day--has-workout';
    el.className = cls;
    el.innerHTML = `<span>${d}</span><span class="calendar__dot"></span>`;
    el.onclick = () => selectDay(d, key, hasWorkout);
    container.appendChild(el);
  }
  const totalCells = firstDay + daysInMonth;
  const remaining = totalCells%7===0 ? 0 : 7-(totalCells%7);
  for (let i=1;i<=remaining;i++) {
    const el = document.createElement('div');
    el.className = 'calendar__day calendar__day--other';
    el.innerHTML = `<span>${i}</span>`;
    container.appendChild(el);
  }
}

function changeMonth(dir) {
  currentMonth += dir;
  if (currentMonth<0){currentMonth=11;currentYear--}
  if (currentMonth>11){currentMonth=0;currentYear++}
  renderCalendar();
  const cal = document.getElementById('calendar');
  cal.style.animation='none';cal.offsetHeight;cal.style.animation='scaleIn 0.3s var(--transition)';
}

function selectDay(day, key, workouts) {
  document.querySelectorAll('.calendar__day--selected').forEach(el => el.classList.remove('calendar__day--selected'));
  document.querySelectorAll('.calendar__day:not(.calendar__day--other)').forEach(el => {
    if (el.querySelector('span').textContent==day) el.classList.add('calendar__day--selected');
  });
  const detail = document.getElementById('dayDetail');
  document.getElementById('dayDetailTitle').innerHTML = `📅 <span>${currentMonth+1}월 ${day}일</span> 운동 기록`;
  const content = document.getElementById('dayDetailContent');
  if (!workouts || workouts.length===0) {
    content.innerHTML = '<div class="day-detail__empty">이 날은 쉬는 날이었어요 😴</div>';
  } else {
    const emojis = {running:'🏃',strength:'🏋️',hiit:'⚡',yoga:'🧘'};
    content.innerHTML = workouts.map(w => `
      <div class="day-workout">
        <div class="day-workout__icon day-workout__icon--${w.type}">${emojis[w.type]||'💪'}</div>
        <div class="day-workout__info">
          <div class="day-workout__name">${w.name}</div>
          <div class="day-workout__meta">
            <span>${Math.round(w.duration/60)}분</span>
            <span>${w.calories} kcal</span>
            <span>${w.heartRate} bpm</span>
          </div>
        </div>
      </div>
    `).join('');
  }
  detail.classList.add('active');
}
renderCalendar();

// ─── Bar Chart ───
function setChartView(view, btn) {
  document.querySelectorAll('.bar-chart__toggle-btn').forEach(b => b.classList.remove('bar-chart__toggle-btn--active'));
  btn.classList.add('bar-chart__toggle-btn--active');
  renderChart(view);
}

function renderChart(view) {
  const container = document.getElementById('chartBars');
  container.innerHTML = '';
  if (view==='week') {
    const days = ['일','월','화','수','목','금','토'];
    const data = new Array(7).fill(0);
    history.forEach(h => {
      const d = new Date(h.date);
      const diff = Math.floor((today-d)/(1000*60*60*24));
      if (diff<7) data[d.getDay()] += h.calories;
    });
    const max = Math.max(...data, 1);
    days.forEach((label, i) => {
      const col = document.createElement('div');
      col.className = 'bar-col';
      const pct = (data[i]/max*100);
      col.innerHTML = `<div class="bar-col__bar" data-value="${data[i]} kcal" style="height:${Math.max(pct,3)}%"></div><span class="bar-col__label">${label}</span>`;
      container.appendChild(col);
    });
  } else {
    for (let w=3;w>=0;w--) {
      let cal=0;
      history.forEach(h => {
        const diff = Math.floor((today-new Date(h.date))/(1000*60*60*24));
        if (diff>=w*7 && diff<(w+1)*7) cal += h.calories;
      });
      const col = document.createElement('div');
      col.className = 'bar-col';
      col.innerHTML = `<div class="bar-col__bar" data-value="${cal} kcal" style="height:${Math.max(cal/2000*100,3)}%"></div><span class="bar-col__label">${4-w}주차</span>`;
      container.appendChild(col);
    }
  }
  setTimeout(() => {
    container.querySelectorAll('.bar-col__bar').forEach(bar => {
      const h = bar.style.height;
      bar.style.height = '3%';
      requestAnimationFrame(() => { bar.style.height = h; });
    });
  }, 50);
}
renderChart('week');

// ─── Monthly Trend ───
function renderTrend() {
  const graph = document.getElementById('trendGraph');
  const labels = document.getElementById('trendLabels');
  const months = [];
  for (let i=5;i>=0;i--) {
    const d = new Date(today.getFullYear(), today.getMonth()-i, 1);
    const monthName = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'][d.getMonth()];
    let cal = 0;
    history.forEach(h => {
      const hd = new Date(h.date);
      if (hd.getFullYear()===d.getFullYear() && hd.getMonth()===d.getMonth()) cal += h.calories;
    });
    months.push({name:monthName,cal});
  }
  const max = Math.max(...months.map(m=>m.cal), 1);
  const colors = ['var(--blue)','var(--purple)','var(--orange)','var(--lime)','var(--lime)','var(--lime)'];
  graph.innerHTML = '<div class="trend-graph__line" style="bottom:50%"></div>' +
    months.map((m,i) => `<div class="trend-bar" data-label="${m.cal} kcal" style="height:${Math.max(m.cal/max*100,4)}%;background:${colors[i]};opacity:${0.4+i*0.12}"></div>`).join('');
  labels.innerHTML = months.map(m => `<span>${m.name}</span>`).join('');
  document.getElementById('trendTotal').textContent = months[months.length-1].cal.toLocaleString() + ' kcal';
}
renderTrend();

// ─── Filter & History List ───
let currentFilter = 'all';
let displayCount = 10;

function filterHistory(filter, btn) {
  currentFilter = filter;
  displayCount = 10;
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('filter-tab--active'));
  btn.classList.add('filter-tab--active');
  renderHistory();
}

function getFilteredHistory() {
  if (currentFilter === 'all') return history;
  return history.filter(h => h.type === currentFilter);
}

function renderHistory() {
  const container = document.getElementById('historyList');
  const emojis = {running:'🏃',strength:'🏋️',hiit:'⚡',yoga:'🧘'};
  const filtered = getFilteredHistory();

  if (filtered.length === 0) {
    container.innerHTML = `
      <div class="history-empty">
        <div class="history-empty__icon">🏋️</div>
        <div class="history-empty__text">아직 운동 기록이 없어요<br>첫 운동을 시작해보세요!</div>
        <a href="workout.html" class="history-empty__btn">운동 시작하기</a>
      </div>`;
    document.getElementById('loadMoreBtn').style.display = 'none';
    return;
  }

  const items = filtered.slice(0, displayCount);
  container.innerHTML = items.map((h, i) => {
    const d = new Date(h.date);
    const dateStr = `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    const durMin = Math.round(h.duration / 60);
    return `
      <div class="history-item" style="animation:fadeInUp 0.4s ${i*0.04}s var(--transition) both">
        <div class="history-item__icon history-item__icon--${h.type}">${emojis[h.type]||'💪'}</div>
        <div class="history-item__info">
          <div class="history-item__name">${h.name}</div>
          <div class="history-item__date">${dateStr}</div>
          <div class="history-item__stats">
            <span class="history-item__stat">⏱ ${durMin}분</span>
            <span class="history-item__stat">🔥 ${h.calories}kcal</span>
            <span class="history-item__stat">❤️ ${h.heartRate}bpm</span>
          </div>
        </div>
      </div>`;
  }).join('');

  document.getElementById('loadMoreBtn').style.display = filtered.length > displayCount ? 'block' : 'none';
}

function loadMore() {
  displayCount += 10;
  renderHistory();
}

renderHistory();

// ─── Weekly Summary Comparison ───
function calcWeeklyComparison() {
  const now = Date.now();
  const weekMs = 7 * 24 * 60 * 60 * 1000;

  // This week data
  const thisWeekData = history.filter(h => (now - new Date(h.date).getTime()) < weekMs);
  const lastWeekData = history.filter(h => {
    const diff = now - new Date(h.date).getTime();
    return diff >= weekMs && diff < weekMs * 2;
  });

  const thisWeekCal = thisWeekData.reduce((a, h) => a + h.calories, 0);
  const lastWeekCal = lastWeekData.reduce((a, h) => a + h.calories, 0);
  const thisWeekTime = thisWeekData.reduce((a, h) => a + h.duration, 0);
  const lastWeekTime = lastWeekData.reduce((a, h) => a + h.duration, 0);

  // Calculate percentage changes
  const calChange = lastWeekCal > 0 ? Math.round((thisWeekCal - lastWeekCal) / lastWeekCal * 100) : 0;
  const timeChange = lastWeekTime > 0 ? Math.round((thisWeekTime - lastWeekTime) / lastWeekTime * 100) : 0;

  const timeEl = document.getElementById('timeChange');
  const calEl = document.getElementById('calChange');

  if (timeEl) {
    timeEl.textContent = timeChange >= 0 ? `+${timeChange}%` : `${timeChange}%`;
    timeEl.className = `summary-card__change summary-card__change--${timeChange >= 0 ? 'up' : 'down'}`;
  }
  if (calEl) {
    calEl.textContent = calChange >= 0 ? `+${calChange}%` : `${calChange}%`;
    calEl.className = `summary-card__change summary-card__change--${calChange >= 0 ? 'up' : 'down'}`;
  }

  return {
    thisWeek: {
      count: thisWeekData.length,
      calories: thisWeekCal,
      time: thisWeekTime,
      avgHR: thisWeekData.length > 0
        ? Math.round(thisWeekData.reduce((a, h) => a + (h.heartRate || 0), 0) / thisWeekData.length)
        : 0
    },
    lastWeek: {
      count: lastWeekData.length,
      calories: lastWeekCal,
      time: lastWeekTime
    },
    changes: {
      count: thisWeekData.length - lastWeekData.length,
      calories: calChange,
      time: timeChange
    }
  };
}
calcWeeklyComparison();

// ─── Workout Type Distribution ───
function calcTypeDistribution() {
  const total = history.length;
  if (total === 0) return;

  const distribution = {
    running: { count: 0, color: 'var(--lime)', emoji: '🏃', label: '러닝' },
    strength: { count: 0, color: 'var(--blue)', emoji: '🏋️', label: '근력' },

  history.forEach(h => {

  });

  return distribution;
}

// ─── Advanced Statistics ───
function calculateAdvancedStats() {
  if (history.length === 0) return null;

  // Average workout duration
  const avgDuration = Math.round(history.reduce((a, h) => a + h.duration, 0) / history.length / 60);

  // Average calories per workout
  const avgCalories = Math.round(history.reduce((a, h) => a + h.calories, 0) / history.length);

  // Most active day of week
  const dayCounts = new Array(7).fill(0);
  history.forEach(h => {
    dayCounts[new Date(h.date).getDay()]++;
  });
  const dayNames = ['일요일', '월요일', '화요일', '수요일', '목요일', '금요일', '토요일'];
  const mostActiveDay = dayNames[dayCounts.indexOf(Math.max(...dayCounts))];

  // Most active hour
  const hourCounts = new Array(24).fill(0);
  history.forEach(h => {
    hourCounts[new Date(h.date).getHours()]++;
  });
  const mostActiveHour = hourCounts.indexOf(Math.max(...hourCounts));

  // Total distance (running only)
  const totalDistance = history
    .filter(h => h.type === 'running')
    .reduce((a, h) => a + (h.distance || 0), 0);

  // Monthly averages
  const monthlyWorkouts = {};
  history.forEach(h => {
    const key = new Date(h.date).toISOString().slice(0, 7);
    if (!monthlyWorkouts[key]) monthlyWorkouts[key] = 0;
    monthlyWorkouts[key]++;
  });
  const monthlyAvg = Object.values(monthlyWorkouts).length > 0
    ? Math.round(Object.values(monthlyWorkouts).reduce((a, b) => a + b, 0) / Object.values(monthlyWorkouts).length)
    : 0;

  return {
    avgDuration,
    avgCalories,
    mostActiveDay,
    mostActiveHour: `${mostActiveHour}:00`,
    totalDistance: totalDistance.toFixed(1),
    monthlyAvg,
    totalWorkouts: history.length,
    totalCalories: history.reduce((a, h) => a + h.calories, 0),
    totalDuration: Math.round(history.reduce((a, h) => a + h.duration, 0) / 3600)
  };
}

// ─── Consistency Score ───
function calculateConsistencyScore() {
  if (history.length < 7) return 0;

  const last30Days = [];
  const now = new Date();
  for (let i = 0; i < 30; i++) {
    const date = new Date(now);
    date.setDate(date.getDate() - i);
    const key = date.toISOString().slice(0, 10);
    const hasWorkout = history.some(h => new Date(h.date).toISOString().slice(0, 10) === key);
    last30Days.push(hasWorkout ? 1 : 0);
  }

  // Count workout days
  const workoutDaysCount = last30Days.reduce((a, b) => a + b, 0);

  // Ideal: 4-5 workouts per week = ~17-21 per month
  const idealMin = 17;
  const idealMax = 25;

  if (workoutDaysCount >= idealMin && workoutDaysCount <= idealMax) return 100;
  if (workoutDaysCount < idealMin) return Math.round(workoutDaysCount / idealMin * 100);
  return Math.max(70, 100 - (workoutDaysCount - idealMax) * 5);
}

// ─── Workout Frequency Analysis ───
function analyzeWorkoutFrequency() {
  if (history.length < 2) return { avgDaysBetween: 0, recommendation: '데이터가 부족합니다' };

  const sortedDates = history
    .map(h => new Date(h.date).getTime())
    .sort((a, b) => b - a);

  let totalGap = 0;
  let gapCount = 0;
  for (let i = 1; i < sortedDates.length; i++) {
    const gap = (sortedDates[i - 1] - sortedDates[i]) / (1000 * 60 * 60 * 24);
    if (gap < 7) { // ignore gaps > 7 days
      totalGap += gap;
      gapCount++;
    }
  }

  const avgDaysBetween = gapCount > 0 ? (totalGap / gapCount).toFixed(1) : 0;
  let recommendation = '';

  if (avgDaysBetween < 1) recommendation = '매일 운동은 대단하지만, 회복일도 필요해요!';
  else if (avgDaysBetween < 2) recommendation = '완벽한 빈도예요! 꾸준히 유지하세요 💪';
  else if (avgDaysBetween < 3) recommendation = '좋은 페이스! 조금 더 자주 해보는 건 어때요?';
  else recommendation = '운동 빈도를 높여볼까요? 주 3-4회가 이상적이에요!';

  return { avgDaysBetween, recommendation };
}

// ─── Calorie Burn Rate Analysis ───
function analyzeCalorieBurnRate() {
  const rates = {};
  history.forEach(h => {
    if (!rates[h.type]) rates[h.type] = { totalCal: 0, totalMin: 0, count: 0 };
    rates[h.type].totalCal += h.calories;
    rates[h.type].totalMin += h.duration / 60;
    rates[h.type].count++;
  });

  const results = {};
  Object.keys(rates).forEach(type => {
    results[type] = {
      avgCalPerMin: rates[type].totalMin > 0
        ? (rates[type].totalCal / rates[type].totalMin).toFixed(1)
        : 0,
      avgCalPerWorkout: rates[type].count > 0
        ? Math.round(rates[type].totalCal / rates[type].count)
        : 0,
      totalSessions: rates[type].count
    };
  });

  return results;
}

  };

  history.forEach(h => {

  });

}

  const frequencyScore = Math.min(100, history.length * 2);
  const intensityScore = Math.min(100,
    history.reduce((a, h) => a + h.calories, 0) / history.length / 5 || 0
  );

  return {
    overall: Math.round((typeScore + consistencyScore + frequencyScore + intensityScore) / 4),
    variety: typeScore,

// ─── Weekly Goal Tracker ───
function getWeeklyGoalData() {
  const weeklyGoal = 5; // 주 5회 목표
  const now = new Date();
  const startOfWeek = new Date(now);
  startOfWeek.setDate(now.getDate() - now.getDay());
  startOfWeek.setHours(0, 0, 0, 0);

  const weekWorkouts = history.filter(h => new Date(h.date) >= startOfWeek);
  const completed = weekWorkouts.length;
  const remaining = Math.max(0, weeklyGoal - completed);
  const percentage = Math.min(100, Math.round(completed / weeklyGoal * 100));

  // Day-by-day completion
  const dayCompletion = [];
  for (let i = 0; i < 7; i++) {
    const date = new Date(startOfWeek);
    date.setDate(startOfWeek.getDate() + i);
    const dateStr = date.toISOString().slice(0, 10);
    const dayWorkouts = history.filter(h =>
      new Date(h.date).toISOString().slice(0, 10) === dateStr
    );
    dayCompletion.push({
      day: ['일', '월', '화', '수', '목', '금', '토'][i],
      completed: dayWorkouts.length > 0,
      count: dayWorkouts.length,
      calories: dayWorkouts.reduce((a, h) => a + h.calories, 0)
    });
  }

  return {
    goal: weeklyGoal,
    completed,
    remaining,
    percentage,
    dayCompletion,
    onTrack: completed >= Math.floor(weeklyGoal * (now.getDay() + 1) / 7)
  };
}

// ─── Workout Intensity Tracker ───
function trackIntensityOverTime() {
  const weeks = [];
  const now = new Date();

  for (let w = 0; w < 8; w++) {
    const weekStart = new Date(now);
    weekStart.setDate(now.getDate() - (w + 1) * 7);
    const weekEnd = new Date(now);
    weekEnd.setDate(now.getDate() - w * 7);

    const weekWorkouts = history.filter(h => {
      const d = new Date(h.date);
      return d >= weekStart && d < weekEnd;
    });

    const avgCalPerMin = weekWorkouts.length > 0
      ? weekWorkouts.reduce((a, h) => a + h.calories / (h.duration / 60), 0) / weekWorkouts.length
      : 0;

    weeks.unshift({
      weekNum: 8 - w,
      avgIntensity: avgCalPerMin.toFixed(1),
      workoutCount: weekWorkouts.length,
      totalCalories: weekWorkouts.reduce((a, h) => a + h.calories, 0),
      totalMinutes: Math.round(weekWorkouts.reduce((a, h) => a + h.duration, 0) / 60)
    });
  }

  return weeks;
}

// ─── Exercise Pattern Detection ───
function detectPatterns() {
  if (history.length < 7) return { patterns: [], suggestions: [] };

  const patterns = [];
  const suggestions = [];

  // Check if user always works out at the same time
  const hours = history.map(h => new Date(h.date).getHours());
  const avgHour = Math.round(hours.reduce((a, b) => a + b, 0) / hours.length);
  const hourVariance = hours.reduce((a, h) => a + Math.pow(h - avgHour, 2), 0) / hours.length;

  if (hourVariance < 4) {
    patterns.push({
      type: 'time',
      label: `주로 ${avgHour}시에 운동합니다`,
      emoji: avgHour < 12 ? '🌅' : avgHour < 18 ? '☀️' : '🌆'
    });
  }

  // Check favorite workout type
  const typeCounts2 = {};
  history.forEach(h => {
    typeCounts2[h.type] = (typeCounts2[h.type] || 0) + 1;
  });
  const sortedTypes = Object.entries(typeCounts2).sort((a, b) => b[1] - a[1]);
  if (sortedTypes.length > 0) {
    const typeEmojis = { running: '🏃', strength: '🏋️', hiit: '⚡', yoga: '🧘' };
    const typeNames = { running: '러닝', strength: '근력', hiit: 'HIIT', yoga: '요가' };
    patterns.push({
      type: 'favorite',
      label: `가장 좋아하는 운동: ${typeNames[sortedTypes[0][0]] || sortedTypes[0][0]}`,
      emoji: typeEmojis[sortedTypes[0][0]] || '💪'
    });
  }

  // Suggest underexercised types
  const allTypes = ['running', 'strength', 'hiit', 'yoga'];
  const typeNames2 = { running: '러닝', strength: '근력', hiit: 'HIIT', yoga: '요가' };
  allTypes.forEach(type => {
    if ((typeCounts2[type] || 0) < history.length * 0.1) {
      suggestions.push(`${typeNames2[type]} 운동을 더 해보는 건 어떨까요?`);
    }
  });

  // Check rest day frequency
  const dates = history.map(h => new Date(h.date).toISOString().slice(0, 10));
  const uniqueDates = [...new Set(dates)].sort().reverse();
  let consecutiveDays = 0;
  for (let i = 0; i < uniqueDates.length - 1; i++) {
    const diff = (new Date(uniqueDates[i]) - new Date(uniqueDates[i + 1])) / 86400000;
    if (diff === 1) consecutiveDays++;
    else break;
  }

  if (consecutiveDays > 6) {
    suggestions.push('7일 이상 연속 운동 중! 회복일을 가져보세요.');
  }

  return { patterns, suggestions };
}

// ─── Workout Prediction ───
function predictNextWorkout() {
  if (history.length < 3) return null;

  // Find most common next-day pattern
  const recentTypes = history.slice(0, 5).map(h => h.type);
  const typeRotation = ['running', 'strength', 'hiit', 'yoga'];

  // Find which type is least recently done
  let leastRecent = 'running';
  let leastRecentIdx = Infinity;

  typeRotation.forEach(type => {
    const idx = recentTypes.indexOf(type);
    if (idx === -1) {
      leastRecent = type;
      leastRecentIdx = -1;
    } else if (idx < leastRecentIdx) {
      // This type was done most recently - skip
    }
  });

  // Actually find least recently done
  for (const type of typeRotation) {
    if (!recentTypes.includes(type)) {
      leastRecent = type;
      break;
    }
  }

  const typeNames3 = { running: '러닝', strength: '근력 운동', hiit: 'HIIT', yoga: '요가' };
  const typeEmojis2 = { running: '🏃', strength: '🏋️', hiit: '⚡', yoga: '🧘' };

  return {
    type: leastRecent,
    name: typeNames3[leastRecent],
    emoji: typeEmojis2[leastRecent],

  };
}

    { id: 'workouts_50', name: '50회 달성', target: 50, current: history.length, emoji: '🏅' },
    { id: 'workouts_100', name: '100회 달성', target: 100, current: history.length, emoji: '🏆' },
    { id: 'cal_10000', name: '1만 칼로리 소모', target: 10000, current: totalCal, emoji: '🔥' },
    { id: 'cal_50000', name: '5만 칼로리 소모', target: 50000, current: totalCal, emoji: '💥' },
    { id: 'streak_7', name: '7일 연속 운동', target: 7, current: parseInt(document.getElementById('streakCount').textContent), emoji: '🔥' },
    { id: 'streak_30', name: '30일 연속 운동', target: 30, current: parseInt(document.getElementById('streakCount').textContent), emoji: '⭐' }
  ];

  return achievements.map(a => ({
    ...a,
    progress: Math.min(100, Math.round(a.current / a.target * 100)),
    completed: a.current >= a.target
  }));
}
