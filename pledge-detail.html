<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>공약 상세 - 기호 7번 김민수</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#1e3a5f;--white:#fff;--gold:#d4a843;--light:#f5f7fa;--dark:#0f1f33;--gray:#6b7b8d;--radius:2px;--shadow:0 4px 24px rgba(30,58,95,.12)}
html{scroll-behavior:smooth}
body{font-family:'Noto Sans KR',sans-serif;color:#222;background:var(--white);overflow-x:hidden}
a{text-decoration:none;color:inherit}
img{max-width:100%;display:block}

/* NAV */
.nav{position:fixed;top:0;left:0;width:100%;background:rgba(255,255,255,.95);backdrop-filter:blur(10px);z-index:1000;border-bottom:1px solid rgba(30,58,95,.08);transition:box-shadow .3s}
.nav.scrolled{box-shadow:0 2px 20px rgba(0,0,0,.1)}
.nav-inner{max-width:1200px;margin:0 auto;padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between}
.nav-logo{font-weight:900;font-size:1.2rem;color:var(--primary)}
.nav-logo span{color:var(--gold)}
.nav-links{display:flex;gap:28px;list-style:none}
.nav-links a{font-size:.9rem;font-weight:500;color:var(--primary);position:relative;transition:color .3s}
.nav-links a:hover{color:var(--gold)}
.nav-links a::after{content:'';position:absolute;bottom:-4px;left:0;width:0;height:2px;background:var(--gold);transition:width .3s}
.nav-links a:hover::after{width:100%}
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;background:none;border:none;padding:8px}
.hamburger span{display:block;width:24px;height:2px;background:var(--primary);transition:all .3s}
.hamburger.active span:nth-child(1){transform:rotate(45deg) translate(5px,5px)}
.hamburger.active span:nth-child(2){opacity:0}
.hamburger.active span:nth-child(3){transform:rotate(-45deg) translate(5px,-5px)}

/* MOBILE MENU */
.mobile-menu{display:none;position:fixed;top:64px;left:0;width:100%;background:var(--white);box-shadow:var(--shadow);padding:24px;z-index:999}
.mobile-menu.open{display:block}
.mobile-menu a{display:block;padding:14px 0;font-size:1rem;font-weight:500;color:var(--primary);border-bottom:1px solid var(--light)}

/* FADE-IN */
.fade-in{opacity:0;transform:translateY(30px);transition:opacity .7s ease,transform .7s ease}
.fade-in.visible{opacity:1;transform:translateY(0)}

/* PLEDGE HERO */
.pledge-hero{padding:120px 24px 60px;background:linear-gradient(135deg,var(--dark) 0%,var(--primary) 100%);color:var(--white);position:relative;overflow:hidden}
.pledge-hero::before{content:'';position:absolute;top:-50%;right:-20%;width:600px;height:600px;background:radial-gradient(circle,rgba(212,168,67,.1) 0%,transparent 70%);pointer-events:none}
.pledge-hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--gold),var(--primary),var(--gold))}
.pledge-hero-inner{max-width:900px;margin:0 auto;display:flex;align-items:center;gap:28px}
.pledge-number{width:72px;height:72px;background:var(--gold);color:var(--dark);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:2rem;border-radius:var(--radius);flex-shrink:0;box-shadow:0 4px 16px rgba(212,168,67,.4)}
.pledge-hero-text h1{font-size:2.2rem;font-weight:900;line-height:1.3;margin-bottom:8px}
.pledge-hero-text p{font-size:1rem;font-weight:300;opacity:.8;line-height:1.6}

/* CONTENT SECTIONS */
.pledge-content{max-width:900px;margin:0 auto;padding:60px 24px 80px}
.content-section{margin-bottom:48px}
.content-section:last-child{margin-bottom:0}
.section-title{display:flex;align-items:center;gap:12px;margin-bottom:24px;padding-bottom:12px;border-bottom:2px solid var(--light)}
.section-title .icon-box{width:40px;height:40px;background:linear-gradient(135deg,var(--primary),var(--dark));color:var(--gold);display:flex;align-items:center;justify-content:center;border-radius:var(--radius);font-size:1rem;flex-shrink:0}
.section-title h2{font-size:1.4rem;font-weight:900;color:var(--primary)}

/* STAT CARDS */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px}
.stat-card{background:var(--light);border-left:4px solid var(--gold);padding:20px 24px;border-radius:var(--radius)}
.stat-card .stat-value{font-size:1.6rem;font-weight:900;color:var(--primary);margin-bottom:4px}
.stat-card .stat-label{font-size:.85rem;color:var(--gray);line-height:1.5}

/* PROBLEM LIST */
.problem-list{display:flex;flex-direction:column;gap:12px}
.problem-item{display:flex;align-items:flex-start;gap:12px;padding:16px 20px;background:var(--white);border:1px solid rgba(30,58,95,.08);border-radius:var(--radius);box-shadow:0 2px 8px rgba(0,0,0,.04)}
.problem-item .problem-icon{width:32px;height:32px;background:#fee2e2;color:#dc2626;display:flex;align-items:center;justify-content:center;border-radius:var(--radius);font-size:.8rem;flex-shrink:0;margin-top:2px}
.problem-item .problem-text{font-size:.95rem;color:#333;line-height:1.6}
.problem-item .problem-text strong{color:var(--primary);font-weight:700}

/* SOLUTION CARDS */
.solution-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px}
.solution-card{background:var(--white);border:1px solid rgba(30,58,95,.08);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);transition:transform .3s,box-shadow .3s}
.solution-card:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(30,58,95,.16)}
.solution-card .solution-icon{width:48px;height:48px;background:linear-gradient(135deg,var(--primary),var(--dark));color:var(--gold);display:flex;align-items:center;justify-content:center;border-radius:var(--radius);font-size:1.2rem;margin-bottom:16px}
.solution-card h3{font-size:1rem;font-weight:700;color:var(--primary);margin-bottom:8px}
.solution-card p{font-size:.9rem;color:var(--gray);line-height:1.6}

/* EFFECT LIST */
.effect-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:16px}
.effect-card{display:flex;align-items:flex-start;gap:14px;padding:20px;background:linear-gradient(135deg,#f0fdf4,#ecfdf5);border:1px solid #bbf7d0;border-radius:var(--radius)}
.effect-card .effect-icon{width:36px;height:36px;background:#16a34a;color:var(--white);display:flex;align-items:center;justify-content:center;border-radius:var(--radius);font-size:.85rem;flex-shrink:0;margin-top:2px}
.effect-card .effect-text{font-size:.95rem;color:#333;line-height:1.6}
.effect-card .effect-text strong{color:#15803d;font-weight:700}

/* ROADMAP */
.roadmap{position:relative;padding-left:40px}
.roadmap::before{content:'';position:absolute;left:15px;top:8px;bottom:8px;width:3px;background:linear-gradient(to bottom,var(--gold),var(--primary))}
.roadmap-item{position:relative;margin-bottom:28px;padding:20px 24px;background:var(--white);border:1px solid rgba(30,58,95,.08);border-radius:var(--radius);box-shadow:0 2px 12px rgba(0,0,0,.05)}
.roadmap-item:last-child{margin-bottom:0}
.roadmap-item::before{content:'';position:absolute;left:-32px;top:24px;width:14px;height:14px;border-radius:50%;background:var(--gold);border:3px solid var(--white);box-shadow:0 0 0 3px var(--gold)}
.roadmap-item .rm-period{display:inline-block;background:var(--primary);color:var(--white);font-size:.75rem;font-weight:700;padding:4px 12px;border-radius:var(--radius);margin-bottom:8px;letter-spacing:.5px}
.roadmap-item h3{font-size:1rem;font-weight:700;color:var(--primary);margin-bottom:6px}
.roadmap-item p{font-size:.9rem;color:var(--gray);line-height:1.6}

/* BACK BUTTON */
.back-section{text-align:center;padding:0 24px 80px;max-width:900px;margin:0 auto}
.btn-back{display:inline-flex;align-items:center;gap:10px;background:linear-gradient(135deg,var(--primary),var(--dark));color:var(--white);border:none;padding:14px 36px;border-radius:var(--radius);font-size:.95rem;font-weight:700;font-family:inherit;cursor:pointer;transition:opacity .3s,transform .3s;text-decoration:none}
.btn-back:hover{opacity:.9;transform:translateY(-1px)}

/* FOOTER */
.footer{background:var(--dark);color:rgba(255,255,255,.6);text-align:center;padding:48px 24px}
.footer-logo{font-size:1.3rem;font-weight:900;color:var(--white);margin-bottom:8px}
.footer-logo span{color:var(--gold)}
.footer p{font-size:.8rem;margin-bottom:4px}
.footer-links{display:flex;justify-content:center;gap:20px;margin-top:16px}
.footer-links a{color:rgba(255,255,255,.5);font-size:1.2rem;transition:color .3s}
.footer-links a:hover{color:var(--gold)}

/* RESPONSIVE */
@media(max-width:768px){
  .nav-links{display:none}
  .hamburger{display:flex}
  .pledge-hero{padding:100px 16px 40px}
  .pledge-hero-inner{flex-direction:column;text-align:center;gap:16px}
  .pledge-number{width:56px;height:56px;font-size:1.5rem}
  .pledge-hero-text h1{font-size:1.6rem}
  .pledge-hero-text p{font-size:.9rem}
  .pledge-content{padding:40px 16px 60px}
  .stat-grid{grid-template-columns:1fr}
  .solution-grid{grid-template-columns:1fr}
  .effect-grid{grid-template-columns:1fr}
  .roadmap{padding-left:32px}
  .section-title h2{font-size:1.2rem}
  .content-section{margin-bottom:36px}
}
@media(max-width:480px){
  .pledge-hero-text h1{font-size:1.4rem}
  .stat-card .stat-value{font-size:1.3rem}
}
</style>
</head>

/* ===== URL PARAMETER & RENDER ===== */
function getUrlParam(name) {
  const params = new URLSearchParams(window.location.search);
  return params.get(name);
}

function renderPledge(id) {
  const pledge = pledges.find(p => p.id === parseInt(id));
  if (!pledge) {
    document.querySelector('.pledge-hero-text h1').textContent = '공약을 찾을 수 없습니다';
    document.querySelector('.pledge-hero-text p').textContent = '올바른 공약 번호를 확인해주세요.';
    document.querySelector('.pledge-content').innerHTML = '<div style="text-align:center;padding:60px 24px;"><p style="color:var(--gray);font-size:1.1rem;">해당 공약 정보가 존재하지 않습니다.</p><a href="candidate.html#pledges" class="btn-back" style="margin-top:24px;display:inline-flex;"><i class="fa-solid fa-arrow-left"></i> 공약 목록으로</a></div>';
    return;
  }

  // Title
  document.title = pledge.title + ' - 기호 7번 김민수';
  document.getElementById('pledgeNumber').textContent = pledge.id;
  document.getElementById('pledgeTitle').textContent = pledge.title;
  document.getElementById('pledgeSubtitle').textContent = pledge.subtitle;

  // 현황
  const statusHtml = pledge.status.map(s =>
    '<div class="stat-card fade-in">' +
      '<div class="stat-value">' + s.value + '</div>' +
      '<div class="stat-label">' + s.label + '</div>' +
    '</div>'
  ).join('');
  document.getElementById('statusGrid').innerHTML = statusHtml;

  // 문제점
  const problemHtml = pledge.problems.map(p =>
    '<div class="problem-item fade-in">' +
      '<div class="problem-icon"><i class="fa-solid fa-xmark"></i></div>' +
      '<div class="problem-text">' + p.text + '</div>' +
    '</div>'
  ).join('');
  document.getElementById('problemList').innerHTML = problemHtml;

  // 해결방안
  const solutionHtml = pledge.solutions.map(s =>
    '<div class="solution-card fade-in">' +
      '<div class="solution-icon"><i class="fa-solid ' + s.icon + '"></i></div>' +
      '<h3>' + s.title + '</h3>' +
      '<p>' + s.desc + '</p>' +
    '</div>'
  ).join('');
  document.getElementById('solutionGrid').innerHTML = solutionHtml;

  // 기대효과
  const effectHtml = pledge.effects.map(e =>
    '<div class="effect-card fade-in">' +
      '<div class="effect-icon"><i class="fa-solid fa-check"></i></div>' +
      '<div class="effect-text">' + e.text + '</div>' +
    '</div>'
  ).join('');
  document.getElementById('effectGrid').innerHTML = effectHtml;

  // 로드맵
  const roadmapHtml = pledge.roadmap.map(r =>
    '<div class="roadmap-item fade-in">' +
      '<span class="rm-period">' + r.period + '</span>' +
      '<h3>' + r.title + '</h3>' +
      '<p>' + r.desc + '</p>' +
    '</div>'
  ).join('');
  document.getElementById('roadmap').innerHTML = roadmapHtml;

  // Re-observe fade-in elements
  document.querySelectorAll('.fade-in:not(.visible)').forEach(el => observer.observe(el));
}

/* ===== NAV SCROLL ===== */
const nav = document.getElementById('nav');
window.addEventListener('scroll', () => {
  nav.classList.toggle('scrolled', window.scrollY > 50);
});

/* ===== HAMBURGER ===== */
const hamburger = document.getElementById('hamburger');
const mobileMenu = document.getElementById('mobileMenu');
hamburger.addEventListener('click', () => {
  hamburger.classList.toggle('active');
  mobileMenu.classList.toggle('open');
});
function closeMenu() {
  hamburger.classList.remove('active');
  mobileMenu.classList.remove('open');
}

/* ===== FADE-IN OBSERVER ===== */
const observer = new IntersectionObserver((entries) => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      e.target.classList.add('visible');
      observer.unobserve(e.target);
    }
  });
}, { threshold: 0.15 });
document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));

/* ===== INIT ===== */
const pledgeId = getUrlParam('id') || '1';
renderPledge(pledgeId);
</script>
