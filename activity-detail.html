<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>활동 상세 - 기호 7번 김민수</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#1e3a5f;--white:#fff;--gold:#d4a843;--light:#f5f7fa;--dark:#0f1f33;--gray:#6b7b8d;--radius:2px;--shadow:0 4px 24px rgba(30,58,95,.12)}
html{scroll-behavior:smooth}
body{font-family:'Noto Sans KR',sans-serif;color:#222;background:var(--white);overflow-x:hidden}
a{text-decoration:none;color:inherit}
img{max-width:100%;display:block}

/* NAV */
.nav{position:fixed;top:0;left:0;width:100%;background:rgba(255,255,255,.95);backdrop-filter:blur(10px);z-index:1000;border-bottom:1px solid rgba(30,58,95,.08);transition:box-shadow .3s}
.nav.scrolled{box-shadow:0 2px 20px rgba(0,0,0,.1)}
.nav-inner{max-width:1200px;margin:0 auto;padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between}
.nav-logo{font-weight:900;font-size:1.2rem;color:var(--primary)}
.nav-logo span{color:var(--gold)}
.nav-links{display:flex;gap:28px;list-style:none}
.nav-links a{font-size:.9rem;font-weight:500;color:var(--primary);position:relative;transition:color .3s}
.nav-links a:hover{color:var(--gold)}
.nav-links a::after{content:'';position:absolute;bottom:-4px;left:0;width:0;height:2px;background:var(--gold);transition:width .3s}
.nav-links a:hover::after{width:100%}
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;background:none;border:none;padding:8px}
.hamburger span{display:block;width:24px;height:2px;background:var(--primary);transition:all .3s}
.hamburger.active span:nth-child(1){transform:rotate(45deg) translate(5px,5px)}
.hamburger.active span:nth-child(2){opacity:0}
.hamburger.active span:nth-child(3){transform:rotate(-45deg) translate(5px,-5px)}

/* MOBILE MENU */
.mobile-menu{display:none;position:fixed;top:64px;left:0;width:100%;background:var(--white);box-shadow:var(--shadow);padding:24px;z-index:999}
.mobile-menu.open{display:block}
.mobile-menu a{display:block;padding:14px 0;font-size:1rem;font-weight:500;color:var(--primary);border-bottom:1px solid var(--light)}

/* ACTIVITY HERO */
.activity-hero{padding:120px 24px 60px;background:linear-gradient(135deg,var(--dark) 0%,var(--primary) 100%);color:var(--white);position:relative;overflow:hidden}
.activity-hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:4px;background:var(--gold)}
.activity-hero-inner{max-width:900px;margin:0 auto}
.activity-icon-wrap{display:inline-flex;align-items:center;justify-content:center;width:64px;height:64px;background:rgba(212,168,67,.15);border:2px solid var(--gold);border-radius:var(--radius);margin-bottom:20px}
.activity-icon-wrap i{font-size:1.8rem;color:var(--gold)}
.activity-hero h1{font-size:2.4rem;font-weight:900;line-height:1.3;margin-bottom:12px}
.activity-hero .breadcrumb{font-size:.85rem;color:rgba(255,255,255,.6);margin-bottom:24px}
.activity-hero .breadcrumb a{color:var(--gold);transition:opacity .3s}
.activity-hero .breadcrumb a:hover{opacity:.8}

/* INFO BAR */
.info-bar{background:var(--light);border-bottom:1px solid rgba(30,58,95,.08)}
.info-bar-inner{max-width:900px;margin:0 auto;padding:20px 24px;display:flex;gap:32px;flex-wrap:wrap}
.info-item{display:flex;align-items:center;gap:10px;font-size:.9rem;color:var(--primary)}
.info-item i{width:36px;height:36px;display:flex;align-items:center;justify-content:center;background:var(--primary);color:var(--gold);border-radius:var(--radius);font-size:.85rem;flex-shrink:0}
.info-item .info-label{font-size:.75rem;color:var(--gray);display:block;margin-bottom:2px}
.info-item .info-value{font-weight:700;color:var(--primary)}

/* CONTENT */
.activity-content{max-width:900px;margin:0 auto;padding:60px 24px}
.activity-content .main-image{width:100%;aspect-ratio:16/9;object-fit:cover;border-radius:var(--radius);margin-bottom:40px;box-shadow:var(--shadow)}
.activity-content .text-block{margin-bottom:48px}
.activity-content .text-block h2{font-size:1.4rem;font-weight:900;color:var(--primary);margin-bottom:16px;padding-left:16px;border-left:4px solid var(--gold)}
.activity-content .text-block p{font-size:1rem;color:#444;line-height:1.85;margin-bottom:16px}
.activity-content .highlight-box{background:var(--light);border-left:4px solid var(--gold);padding:24px 28px;border-radius:var(--radius);margin:32px 0;font-size:.95rem;color:var(--primary);line-height:1.7}
.activity-content .highlight-box i{color:var(--gold);margin-right:8px}

/* RELATED PHOTOS */
.related-photos{max-width:900px;margin:0 auto;padding:0 24px 60px}
.related-photos h2{font-size:1.4rem;font-weight:900;color:var(--primary);margin-bottom:24px;padding-left:16px;border-left:4px solid var(--gold)}
.photos-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.photo-item{position:relative;aspect-ratio:4/3;border-radius:var(--radius);overflow:hidden;background:var(--primary)}
.photo-item img{width:100%;height:100%;object-fit:cover;transition:transform .5s}
.photo-item:hover img{transform:scale(1.05)}
.photo-item .photo-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(15,31,51,.6),transparent);display:flex;align-items:flex-end;padding:16px;opacity:0;transition:opacity .3s}
.photo-item:hover .photo-overlay{opacity:1}
.photo-item .photo-overlay span{color:var(--white);font-size:.85rem;font-weight:500}
.photo-placeholder{position:relative;aspect-ratio:4/3;border-radius:var(--radius);overflow:hidden;background:linear-gradient(135deg,var(--primary),var(--dark));display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:rgba(255,255,255,.5)}
.photo-placeholder i{font-size:2.5rem;color:var(--gold);opacity:.7}
.photo-placeholder span{font-size:.8rem}

/* BACK BUTTON */
.back-section{max-width:900px;margin:0 auto;padding:0 24px 80px;text-align:center}
.btn-back{display:inline-flex;align-items:center;gap:10px;background:linear-gradient(135deg,var(--primary),var(--dark));color:var(--white);border:none;padding:16px 40px;border-radius:var(--radius);font-size:1rem;font-weight:700;font-family:inherit;cursor:pointer;transition:all .3s;text-decoration:none}
.btn-back:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(30,58,95,.3)}
.btn-back i{font-size:.9rem}

/* FOOTER */
.footer{background:var(--dark);color:rgba(255,255,255,.6);text-align:center;padding:48px 24px}
.footer-logo{font-size:1.3rem;font-weight:900;color:var(--white);margin-bottom:8px}
.footer-logo span{color:var(--gold)}
.footer p{font-size:.8rem;margin-bottom:4px}
.footer-links{display:flex;justify-content:center;gap:20px;margin-top:16px}
.footer-links a{color:rgba(255,255,255,.5);font-size:1.2rem;transition:color .3s}
.footer-links a:hover{color:var(--gold)}

/* FADE-IN */
.fade-in{opacity:0;transform:translateY(30px);transition:opacity .7s ease,transform .7s ease}
.fade-in.visible{opacity:1;transform:translateY(0)}

/* NOT FOUND */
.not-found{max-width:900px;margin:0 auto;padding:160px 24px 120px;text-align:center}
.not-found i{font-size:4rem;color:var(--gray);margin-bottom:24px;opacity:.5}
.not-found h2{font-size:1.8rem;font-weight:900;color:var(--primary);margin-bottom:12px}
.not-found p{color:var(--gray);margin-bottom:32px;font-size:1rem}

/* RESPONSIVE */
@media(max-width:768px){
  .nav-links{display:none}
  .hamburger{display:flex}
  .activity-hero h1{font-size:1.7rem}
  .activity-hero{padding:100px 16px 40px}
  .info-bar-inner{gap:20px;padding:16px}
  .info-item{font-size:.85rem}
  .activity-content{padding:40px 16px}
  .activity-content .text-block h2{font-size:1.2rem}
  .photos-grid{grid-template-columns:repeat(2,1fr);gap:12px}
  .related-photos{padding:0 16px 40px}
  .related-photos h2{font-size:1.2rem}
  .back-section{padding:0 16px 60px}
  .btn-back{padding:14px 32px;font-size:.9rem}
}
@media(max-width:480px){
  .info-bar-inner{flex-direction:column;gap:14px}
  .activity-hero h1{font-size:1.5rem}
  .photos-grid{grid-template-columns:1fr}
}
</style>
</head>

/* ========== PAGE LOGIC ========== */
(function() {
  const params = new URLSearchParams(window.location.search);
  const id = parseInt(params.get('id'));
  const activity = activities.find(a => a.id === id);

  if (!activity) {
    document.getElementById('activityHero').style.display = 'none';
    document.getElementById('infoBar').style.display = 'none';
    document.getElementById('activityContent').style.display = 'none';
    document.getElementById('relatedPhotos').style.display = 'none';
    document.querySelector('.back-section').style.display = 'none';
    document.getElementById('notFound').style.display = 'block';
    return;
  }

  /* Set page title */
  document.title = activity.title + ' - 기호 7번 김민수';

  /* Hero */
  document.getElementById('breadcrumbTitle').textContent = activity.title;
  document.getElementById('activityIcon').className = activity.icon;
  document.getElementById('activityTitle').textContent = activity.title;

  /* Info bar */
  document.getElementById('infoDate').textContent = activity.date;
  document.getElementById('infoLocation').textContent = activity.location;
  document.getElementById('infoAttendees').textContent = activity.attendees;

  /* Content */
  const contentEl = document.getElementById('activityContent');
  let html = '';

  /* Main image */
  html += '<img src="' + activity.image + '" alt="' + activity.title + '" class="main-image fade-in">';

  /* Text blocks */
  activity.content.forEach(function(block) {
    html += '<div class="text-block fade-in">';
    html += '<h2>' + block.heading + '</h2>';
    block.paragraphs.forEach(function(p) {
      html += '<p>' + p + '</p>';
    });
    html += '</div>';
  });

  /* Highlight box */
  if (activity.highlight) {
    html += '<div class="highlight-box fade-in"><i class="fa-solid fa-quote-left"></i> ' + activity.highlight + '</div>';
  }

  contentEl.innerHTML = html;

  /* Related photos (icon placeholders in colored boxes + main image variations) */
  const photosGrid = document.getElementById('photosGrid');
  let photosHtml = '';

  /* First item: actual image */
  photosHtml += '<div class="photo-item fade-in">';
  photosHtml += '<img src="' + activity.image + '" alt="' + activity.title + '">';
  photosHtml += '<div class="photo-overlay"><span><i class="fa-solid fa-camera"></i> ' + activity.title + '</span></div>';
  photosHtml += '</div>';

  /* Remaining 3 items: icon placeholders */
  activity.relatedIcons.slice(0, 3).forEach(function(item) {
    photosHtml += '<div class="photo-placeholder fade-in" style="background:linear-gradient(135deg,' + item.color + ',' + item.color + 'dd)">';
    photosHtml += '<i class="' + item.icon + '"></i>';
    photosHtml += '<span>' + item.label + '</span>';
    photosHtml += '</div>';
  });

  photosGrid.innerHTML = photosHtml;
})();

/* ========== NAV SCROLL ========== */
const nav = document.getElementById('nav');
window.addEventListener('scroll', function() {
  nav.classList.toggle('scrolled', window.scrollY > 50);
});

/* ========== HAMBURGER ========== */
const hamburger = document.getElementById('hamburger');
const mobileMenu = document.getElementById('mobileMenu');
hamburger.addEventListener('click', function() {
  hamburger.classList.toggle('active');
  mobileMenu.classList.toggle('open');
});
function closeMenu() {
  hamburger.classList.remove('active');
  mobileMenu.classList.remove('open');
}

/* ========== FADE-IN ON SCROLL ========== */
const observer = new IntersectionObserver(function(entries) {
  entries.forEach(function(e) {
    if (e.isIntersecting) {
      e.target.classList.add('visible');
      observer.unobserve(e.target);
    }
  });
}, { threshold: 0.15 });
document.querySelectorAll('.fade-in').forEach(function(el) {
  observer.observe(el);
});
</script>
