name: GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            portfolio-sites/ad-agency-original
            portfolio-sites/ad-agency-type2
            portfolio-sites/ad-agency-v2
            portfolio-sites/ap-movement
            portfolio-sites/ap-movement-v2
            portfolio-sites/apartment
            portfolio-sites/apartment-type2
            portfolio-sites/apartment-v2
            portfolio-sites/beauty-clinic
            portfolio-sites/burumable-game
            portfolio-sites/cafe
            portfolio-sites/cafe-pwa
            portfolio-sites/cafe-type2
            portfolio-sites/car-type2
            portfolio-sites/clean-partner
            portfolio-sites/clinic-blog
            portfolio-sites/clinic-blog-v2
            portfolio-sites/clinic-type2
            portfolio-sites/clinic-type2-tw
            portfolio-sites/cocktail-bar
            portfolio-sites/derma-clinic
            portfolio-sites/derma-type2
            portfolio-sites/derma-type2-tw
            portfolio-sites/dermatology
            portfolio-sites/english-academy
            portfolio-sites/farm
            portfolio-sites/farm-shop
            portfolio-sites/farm-shop-v2
            portfolio-sites/farm-type2
            portfolio-sites/fitness
            portfolio-sites/fitness-app
            portfolio-sites/fitness-type2
            portfolio-sites/hanwoo
            portfolio-sites/interior
            portfolio-sites/interior-type2
            portfolio-sites/invitation-service
            portfolio-sites/kmong-dashboard
            portfolio-sites/kmong-service
            portfolio-sites/korean-clinic
            portfolio-sites/laundry-factory
            portfolio-sites/law-firm
            portfolio-sites/law-firm-type2
            portfolio-sites/law-firm-v2
            portfolio-sites/law-firm-v3
            portfolio-sites/lawfirm
            portfolio-sites/leak-detection
            portfolio-sites/mademoiselle-hair
            portfolio-sites/marketing-agency
            portfolio-sites/marketing-agency-portfolio
            portfolio-sites/mindmap-app
            portfolio-sites/notion-service
            portfolio-sites/onda-ad
            portfolio-sites/onda-marketing
            portfolio-sites/onda-marketing-dark
            portfolio-sites/onda-os-service
            portfolio-sites/onda-portfolio
            portfolio-sites/onda-sales
            portfolio-sites/onda-service-guide
            portfolio-sites/pension
            portfolio-sites/pension-type2
            portfolio-sites/threeway-pension
            portfolio-sites/pet-shop
            portfolio-sites/pet-type2
            portfolio-sites/pet-velydog
            portfolio-sites/pet-velydog-type2
            portfolio-sites/pg-nakta
            portfolio-sites/portfolio-list
            portfolio-sites/portfolio-showcase
            portfolio-sites/premium-apartment
            portfolio-sites/premium-dining
            portfolio-sites/premium-gym
            portfolio-sites/premium-robot
            portfolio-sites/prototype-v1
            portfolio-sites/prototype-v2
            portfolio-sites/prototype-v3
            portfolio-sites/pups
            portfolio-sites/showcase-apartment
            portfolio-sites/used-car
          sparse-checkout-cone-mode: false
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
